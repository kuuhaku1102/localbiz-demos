<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>居酒屋 はる | 新富町で、ほっとする一杯と出会う夜。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #8B2E2E;
    --primary-dark: #6B1F1F;
    --primary-light: #C45C5C;
    --accent: #D4A853;
    --accent-light: #E8C87A;
    --bg-dark: #1A1008;
    --bg-mid: #2C1A0E;
    --bg-warm: #F8F3EC;
    --bg-cream: #FDF8F2;
    --text-main: #2C1A0E;
    --text-sub: #6B5B4E;
    --text-light: #9B8B7E;
    --text-white: #FDF8F2;
    --border: #E8DDD4;
    --shadow: rgba(44, 26, 14, 0.15);
    --font-serif: 'Shippori Mincho', 'Noto Serif JP', serif;
    --font-sans: 'Noto Sans JP', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-sans);
    background-color: var(--bg-cream);
    color: var(--text-main);
    overflow-x: hidden;
    line-height: 1.8;
  }

  /* ========== HEADER ========== */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 0 40px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.4s ease, box-shadow 0.4s ease;
  }

  header.scrolled {
    background: rgba(26, 16, 8, 0.95);
    backdrop-filter: blur(10px);
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .header-logo {
    display: flex;
    flex-direction: column;
    text-decoration: none;
  }

  .header-logo .logo-main {
    font-family: var(--font-serif);
    font-size: 1.3rem;
    font-weight: 700;
    color: #FDF8F2;
    letter-spacing: 0.1em;
    line-height: 1;
  }

  .header-logo .logo-sub {
    font-size: 0.65rem;
    color: var(--accent-light);
    letter-spacing: 0.2em;
    margin-top: 3px;
    font-weight: 300;
  }

  nav ul {
    display: flex;
    list-style: none;
    gap: 32px;
    align-items: center;
  }

  nav ul li a {
    text-decoration: none;
    color: rgba(253, 248, 242, 0.85);
    font-size: 0.82rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    position: relative;
    padding-bottom: 4px;
    transition: color 0.3s ease;
  }

  nav ul li a::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 1px;
    background: var(--accent);
    transition: width 0.3s ease;
  }

  nav ul li a:hover {
    color: var(--accent-light);
  }

  nav ul li a:hover::after { width: 100%; }

  .nav-cta {
    background: var(--primary);
    color: #FDF8F2 !important;
    padding: 9px 20px !important;
    border-radius: 3px;
    font-weight: 500 !important;
    transition: background 0.3s ease, transform 0.2s ease !important;
  }

  .nav-cta::after { display: none !important; }

  .nav-cta:hover {
    background: var(--primary-light) !important;
    transform: translateY(-1px);
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 5px;
  }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: #FDF8F2;
    border-radius: 2px;
    transition: all 0.3s ease;
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 72px; left: 0; right: 0;
    background: rgba(26, 16, 8, 0.98);
    backdrop-filter: blur(10px);
    padding: 20px 0;
    z-index: 999;
    border-bottom: 1px solid rgba(212, 168, 83, 0.2);
  }

  .mobile-menu.active { display: block; }

  .mobile-menu ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .mobile-menu ul li a {
    display: block;
    padding: 14px 40px;
    color: rgba(253, 248, 242, 0.9);
    text-decoration: none;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: color 0.3s, background 0.3s;
  }

  .mobile-menu ul li a:hover {
    color: var(--accent-light);
    background: rgba(212, 168, 83, 0.05);
  }

  /* ========== HERO ========== */
  .hero {
    position: relative;
    height: 100vh;
    min-height: 600px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slider-wrapper {
    position: absolute;
    inset: 0;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  .slide.active { opacity: 1; }

  .slide-img {
    width: 100%;
    height: 110%;
    object-fit: cover;
    object-position: center;
    will-change: transform;
  }

  .slide-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(26, 16, 8, 0.3) 0%,
      rgba(26, 16, 8, 0.55) 50%,
      rgba(26, 16, 8, 0.7) 100%
    );
  }

  /* SVG Dashed Circle */
  .hero-deco-circle {
    position: absolute;
    top: 60px;
    right: 80px;
    z-index: 2;
    opacity: 0.35;
    animation: rotateSlow 20s linear infinite;
  }

  @keyframes rotateSlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .hero-deco-circle2 {
    position: absolute;
    bottom: 100px;
    left: 60px;
    z-index: 2;
    opacity: 0.2;
    animation: rotateSlow 30s linear infinite reverse;
  }

  .hero-content {
    position: relative;
    z-index: 3;
    text-align: center;
    color: #FDF8F2;
    padding: 0 20px;
  }

  .hero-tag {
    display: inline-block;
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    color: var(--accent-light);
    border: 1px solid rgba(212, 168, 83, 0.5);
    padding: 6px 18px;
    margin-bottom: 24px;
    text-transform: uppercase;
    font-weight: 400;
    animation: fadeInDown 1s 0.3s both;
  }

  .hero-title {
    font-family: var(--font-serif);
    font-size: clamp(2.2rem, 6vw, 4.2rem);
    font-weight: 700;
    line-height: 1.4;
    letter-spacing: 0.05em;
    margin-bottom: 20px;
    animation: fadeInUp 1s 0.5s both;
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }

  .hero-title span {
    color: var(--accent-light);
  }

  .hero-sub {
    font-size: clamp(0.85rem, 2vw, 1.05rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    color: rgba(253, 248, 242, 0.85);
    margin-bottom: 40px;
    animation: fadeInUp 1s 0.7s both;
  }

  .hero-btns {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeInUp 1s 0.9s both;
  }

  /* ========== BUTTONS ========== */
  .btn-main {
    position: relative;
    display: inline-block;
    padding: 14px 36px;
    background: var(--primary);
    color: #FDF8F2;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    border-radius: 3px;
    overflow: hidden;
    transition: color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
    z-index: 0;
  }

  .btn-main::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--primary-light);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
    z-index: -1;
  }

  .btn-main:hover::before { transform: scaleX(1); }
  .btn-main:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(139, 46, 46, 0.4);
  }

  .btn-sub {
    position: relative;
    display: inline-block;
    padding: 14px 36px;
    border: 1px solid rgba(253, 248, 242, 0.6);
    color: #FDF8F2;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    border-radius: 3px;
    overflow: hidden;
    transition: color 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
    z-index: 0;
  }

  .btn-sub::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 100%;
    background: rgba(253, 248, 242, 0.12);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.4s ease;
    z-index: -1;
  }

  .btn-sub:hover::before { transform: scaleY(1); }
  .btn-sub:hover {
    border-color: rgba(253, 248, 242, 0.9);
    transform: translateY(-2px);
  }

  .btn-accent {
    position: relative;
    display: inline-block;
    padding: 16px 44px;
    background: var(--accent);
    color: var(--bg-dark);
    text-decoration: none;
    font-size: 0.92rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    border-radius: 3px;
    overflow: hidden;
    transition: color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
    z-index: 0;
  }

  .btn-accent::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-light);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
    z-index: -1;
  }

  .btn-accent:hover::before { transform: scaleX(1); }
  .btn-accent:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(212, 168, 83, 0.4);
  }

  /* Slider Dots */
  .slider-dots {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    display: flex;
    gap: 10px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(253, 248, 242, 0.4);
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid rgba(253, 248, 242, 0.6);
  }

  .dot.active {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.3);
  }

  /* Scroll indicator */
  .scroll-indicator {
    position: absolute;
    bottom: 40px;
    right: 40px;
    z-index: 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: rgba(253, 248, 242, 0.6);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    writing-mode: vertical-rl;
    animation: bounce 2s ease infinite;
  }

  .scroll-indicator::after {
    content: '';
    display: block;
    width: 1px;
    height: 50px;
    background: linear-gradient(to bottom, rgba(212, 168, 83, 0.8), transparent);
    margin-top: 8px;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ========== WAVE DIVIDER ========== */
  .wave-divider {
    display: block;
    width: 100%;
    overflow: hidden;
    line-height: 0;
    margin-top: -1px;
  }

  .wave-divider svg {
    display: block;
    width: 100%;
  }

  /* ========== SECTION COMMONS ========== */
  section {
    padding: 100px 0;
  }

  .container {
    max-width: 1140px;
    margin: 0 auto;
    padding: 0 40px;
  }

  .section-head {
    text-align: center;
    margin-bottom: 60px;
  }

  .section-tag {
    display: inline-block;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    color: var(--primary);
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 12px;
    position: relative;
    padding: 0 20px;
  }

  .section-tag::before,
  .section-tag::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30px;
    height: 1px;
    background: var(--accent);
  }

  .section-tag::before { right: 100%; margin-right: -20px; }
  .section-tag::after { left: 100%; margin-left: -20px; }

  .section-title {
    font-family: var(--font-serif);
    font-size: clamp(1.7rem, 4vw, 2.6rem);
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: 0.05em;
    line-height: 1.4;
    margin-bottom: 16px;
  }

  .section-title span {
    color: var(--primary);
  }

  .section-desc {
    font-size: 0.92rem;
    color: var(--text-sub);
    line-height: 1.9;
    max-width: 580px;
    margin: 0 auto;
    letter-spacing: 0.05em;
  }

  /* Deco line */
  .deco-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 16px;
  }

  .deco-line::before,
  .deco-line::after {
    content: '';
    width: 50px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--accent));
  }

  .deco-line::after {
    background: linear-gradient(to left, transparent, var(--accent));
  }

  .deco-line span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: block;
  }

  /* ========== CONCEPT ========== */
  .concept-section {
    background: var(--bg-cream);
    position: relative;
    overflow: hidden;
  }

  .concept-section::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212, 168, 83, 0.06), transparent 70%);
    pointer-events: none;
  }

  .concept-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .concept-img-wrap {
    position: relative;
  }

  .concept-img-main {
    width: 100%;
    height: 480px;
    object-fit: cover;
    border-radius: 4px;
    display: block;
    box-shadow: 20px 20px 60px var(--shadow);
  }

  .concept-img-deco {
    position: absolute;
    bottom: -30px;
    right: -30px;
    width: 180px;
    height: 180px;
    border: 2px solid var(--accent);
    border-radius: 4px;
    z-index: -1;
    opacity: 0.4;
  }

  .concept-img-badge {
    position: absolute;
    top: 24px;
    left: -20px;
    background: var(--primary);
    color: #FDF8F2;
    padding: 14px 18px;
    text-align: center;
    border-radius: 3px;
    box-shadow: 0 6px 20px rgba(139, 46, 46, 0.35);
  }

  .concept-img-badge .badge-num {
    font-family: var(--font-serif);
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1;
    color: var(--accent-light);
  }

  .concept-img-badge .badge-text {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    margin-top: 4px;
    opacity: 0.9;
  }

  .concept-text .section-head {
    text-align: left;
    margin-bottom: 30px;
  }

  .concept-text .section-head .section-tag::before { display: none; }
  .concept-text .section-head .section-tag { padding-left: 0; }

  .concept-body {
    font-size: 0.93rem;
    color: var(--text-sub);
    line-height: 2.1;
    letter-spacing: 0.06em;
    margin-bottom: 32px;
  }

  .concept-features {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 36px;
  }

  .concept-feature {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 0.88rem;
    color: var(--text-main);
    font-weight: 500;
    letter-spacing: 0.06em;
  }

  .concept-feature-icon {
    width: 36px;
    height: 36px;
    background: rgba(139, 46, 46, 0.08);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1rem;
  }

  .btn-dark {
    position: relative;
    display: inline-block;
    padding: 14px 36px;
    background: var(--bg-dark);
    color: #FDF8F2;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    border-radius: 3px;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.3s ease;
    z-index: 0;
  }

  .btn-dark::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--primary-dark);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
    z-index: -1;
  }

  .btn-dark:hover::before { transform: scaleX(1); }
  .btn-dark:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(26, 16, 8, 0.3);
  }

  /* ========== MENU ========== */
  .menu-section {
    background: var(--bg-warm);
    position: relative;
    overflow: hidden;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
  }

  .menu-card {
    background: #FDF8F2;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 20px var(--shadow);
    position: relative;
    transition: transform 0.35s ease, box-shadow 0.35s ease;
  }

  .menu-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
    z-index: 2;
  }

  .menu-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 16px 40px rgba(44, 26, 14, 0.2);
  }

  .menu-card:hover::before { transform: scaleX(1); }

  .menu-card-body {
    padding: 28px 26px;
  }

  .menu-card-label {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--primary);
    background: rgba(139, 46, 46, 0.07);
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 12px;
    font-weight: 500;
  }

  .menu-card-name {
    font-family: var(--font-serif);
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 10px;
    letter-spacing: 0.05em;
    line-height: 1.5;
  }

  .menu-card-desc {
    font-size: 0.8rem;
    color: var(--text-sub);
    line-height: 1.8;
    letter-spacing: 0.04em;
    margin-bottom: 18px;
  }

  .menu-card-price {
    font-family: var(--font-serif);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.02em;
  }

  .menu-card-price span {
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-light);
    margin-left: 2px;
  }

  .menu-card.featured {
    grid-column: span 1;
    border: 2px solid var(--accent);
  }

  .menu-card.featured .menu-card-label {
    background: var(--accent);
    color: var(--bg-dark);
    font-weight: 700;
  }

  .menu-card.wide {
    grid-column: span 2;
  }

  /* ========== GALLERY ========== */
  .gallery-section {
    background: var(--bg-dark);
    position: relative;
  }

  .gallery-section .section-title {
    color: #FDF8F2;
  }

  .gallery-section .section-tag {
    color: var(--accent-light);
  }

  .gallery-section .section-desc {
    color: rgba(253, 248, 242, 0.7);
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: auto;
    gap: 16px;
  }

  .gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    cursor: pointer;
  }

  .gallery-item:first-child {
    grid-column: span 2;
    grid-row: span 2;
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    min-height: 220px;
    object-fit: cover;
    display: block;
    transition: transform 0.6s ease;
  }

  .gallery-item:hover img {
    transform: scale(1.08);
  }

  .gallery-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(26, 16, 8, 0.85), transparent 60%);
    opacity: 0;
    transition: opacity 0.4s ease;
    display: flex;
    align-items: flex-end;
    padding: 24px;
  }

  .gallery-item:hover .gallery-overlay {
    opacity: 1;
  }

  .gallery-overlay-text {
    color: #FDF8F2;
    font-family: var(--font-serif);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    transform: translateY(10px);
    transition: transform 0.4s ease;
  }

  .gallery-item:hover .gallery-overlay-text {
    transform: translateY(0);
  }

  /* ========== STATS ========== */
  .stats-section {
    background: var(--primary-dark);
    padding: 80px 0;
    position: relative;
    overflow: hidden;
  }
