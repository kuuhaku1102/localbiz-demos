<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little chef | 小さなお店に、大きなおいしさ。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--primary:#c8773a;
--primary-dark:#a85f28;
--primary-light:#e8a96a;
--accent:#2d5a3d;
--accent-light:#4a8a5f;
--cream:#fdf8f2;
--warm-white:#fffcf7;
--dark:#1a1208;
--text:#3a2e1e;
--text-light:#7a6a55;
--border:#e8d9c5;
--section-bg:#f5ede1;
}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--warm-white);overflow-x:hidden}

/* ===== HEADER ===== */
header{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:18px 0;transition:all 0.4s ease;background:transparent}
header.scrolled{background:rgba(253,248,242,0.97);backdrop-filter:blur(12px);box-shadow:0 2px 20px rgba(0,0,0,0.08);padding:12px 0}
.header-inner{max-width:1200px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;flex-direction:column;line-height:1}
.logo-main{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--warm-white);letter-spacing:1px;transition:color 0.4s}
.logo-sub{font-family:'Noto Sans JP',sans-serif;font-size:10px;font-weight:300;color:rgba(255,255,255,0.8);letter-spacing:4px;margin-top:2px;transition:color 0.4s}
header.scrolled .logo-main{color:var(--primary)}
header.scrolled .logo-sub{color:var(--text-light)}
nav{display:flex;align-items:center;gap:36px}
nav a{font-size:13px;font-weight:500;text-decoration:none;color:rgba(255,255,255,0.9);letter-spacing:1px;position:relative;padding-bottom:4px;transition:color 0.3s}
nav a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--primary);transition:width 0.3s ease}
nav a:hover::after{width:100%}
nav a:hover{color:var(--primary-light)}
header.scrolled nav a{color:var(--text)}
header.scrolled nav a:hover{color:var(--primary)}
.header-cta{background:var(--primary);color:#fff!important;padding:10px 22px!important;border-radius:30px;font-size:12px!important;letter-spacing:2px!important;transition:all 0.3s ease!important;position:relative;overflow:hidden}
.header-cta::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:var(--primary-dark);transform:scaleX(0);transform-origin:left;transition:transform 0.3s ease;z-index:-1}
.header-cta:hover::before{transform:scaleX(1)}
.header-cta::after{display:none!important}
.hamburger{display:none;flex-direction:column;gap:6px;cursor:pointer;padding:5px}
.hamburger span{display:block;width:26px;height:2px;background:var(--warm-white);transition:all 0.3s}
header.scrolled .hamburger span{background:var(--dark)}
.mobile-menu{display:none;position:fixed;top:0;left:0;width:100%;height:100vh;background:rgba(253,248,242,0.98);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:40px}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:22px;font-family:'Noto Serif JP',serif;color:var(--text);text-decoration:none;letter-spacing:2px;transition:color 0.3s}
.mobile-menu a:hover{color:var(--primary)}
.mobile-menu-close{position:absolute;top:24px;right:30px;font-size:30px;cursor:pointer;color:var(--text)}

/* ===== HERO ===== */
.hero{position:relative;height:100vh;min-height:600px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.hero-slider{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
.hero-slide{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;transition:opacity 1.2s ease}
.hero-slide.active{opacity:1}
.hero-slide img{width:100%;height:100%;object-fit:cover;transform:scale(1.05);transition:transform 8s ease}
.hero-slide.active img{transform:scale(1)}
.parallax-img{will-change:transform}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,18,8,0.65) 0%,rgba(26,18,8,0.35) 60%,rgba(45,90,61,0.25) 100%);z-index:1}
.hero-content{position:relative;z-index:3;text-align:center;color:#fff;padding:0 20px}
.hero-badge{display:inline-block;background:rgba(200,119,58,0.9);color:#fff;font-size:11px;letter-spacing:4px;padding:6px 20px;border-radius:20px;margin-bottom:28px;font-weight:500;animation:fadeInDown 1s ease 0.3s both}
.hero-title{font-family:'Noto Serif JP',serif;font-size:clamp(36px,6vw,80px);font-weight:700;line-height:1.2;letter-spacing:2px;margin-bottom:20px;animation:fadeInUp 1s ease 0.6s both}
.hero-subtitle{font-size:clamp(14px,2vw,18px);font-weight:300;letter-spacing:6px;opacity:0.9;margin-bottom:50px;animation:fadeInUp 1s ease 0.9s both}
.hero-btns{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;animation:fadeInUp 1s ease 1.2s both}
.btn-primary{display:inline-block;padding:16px 42px;background:var(--primary);color:#fff;text-decoration:none;font-size:14px;letter-spacing:3px;border-radius:40px;font-weight:500;position:relative;overflow:hidden;transition:all 0.3s ease}
.btn-primary::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:var(--primary-dark);transform:scaleX(0);transform-origin:left;transition:transform 0.4s ease;z-index:-1}
.btn-primary:hover::before{transform:scaleX(1)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(200,119,58,0.4)}
.btn-secondary{display:inline-block;padding:15px 42px;border:1px solid rgba(255,255,255,0.7);color:#fff;text-decoration:none;font-size:14px;letter-spacing:3px;border-radius:40px;font-weight:300;position:relative;overflow:hidden;transition:all 0.3s ease}
.btn-secondary::before{content:'';position:absolute;bottom:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.15);transform:scaleY(0);transform-origin:bottom;transition:transform 0.4s ease;z-index:-1}
.btn-secondary:hover::before{transform:scaleY(1)}
.hero-dots{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:12px}
.hero-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.7);cursor:pointer;transition:all 0.3s}
.hero-dot.active{background:#fff;border-color:#fff;transform:scale(1.3)}
.hero-scroll{position:absolute;bottom:45px;right:50px;z-index:10;display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(255,255,255,0.7);font-size:10px;letter-spacing:3px;animation:float 2s ease-in-out infinite}
.hero-scroll-line{width:1px;height:50px;background:linear-gradient(to bottom,rgba(255,255,255,0.7),transparent)}

/* SVG Decorations */
.hero-deco{position:absolute;z-index:2;pointer-events:none}
.hero-deco-tl{top:15%;left:5%}
.hero-deco-tr{top:20%;right:6%;opacity:0.6}

/* ===== WAVE DIVIDER ===== */
.wave-divider{width:100%;overflow:hidden;line-height:0}
.wave-divider svg{display:block;width:100%;height:80px}
.wave-top{margin-bottom:-2px}
.wave-bottom{margin-top:-2px}

/* ===== CONCEPT ===== */
.section{padding:100px 0}
.container{max-width:1200px;margin:0 auto;padding:0 40px}
.section-label{font-size:11px;letter-spacing:6px;color:var(--primary);font-weight:500;text-transform:uppercase;display:block;margin-bottom:12px}
.section-title{font-family:'Noto Serif JP',serif;font-size:clamp(26px,4vw,44px);font-weight:700;line-height:1.4;color:var(--dark);margin-bottom:20px}
.section-divider{width:50px;height:2px;background:linear-gradient(to right,var(--primary),var(--primary-light));margin:0 auto 50px;display:block}
.section-divider.left{margin:16px 0 40px}

.concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.concept-text .section-body{font-size:16px;line-height:2;color:var(--text-light);margin-bottom:30px;font-weight:300}
.concept-img{position:relative}
.concept-img img{width:100%;height:480px;object-fit:cover;border-radius:12px}
.concept-img-deco{position:absolute;bottom:-20px;right:-20px;width:200px;height:200px;border:2px solid var(--primary-light);border-radius:12px;z-index:-1;opacity:0.5}
.concept-img-tag{position:absolute;bottom:30px;left:-30px;background:var(--primary);color:#fff;padding:20px 24px;border-radius:10px;box-shadow:0 10px 30px rgba(200,119,58,0.3)}
.concept-img-tag .tag-num{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;line-height:1}
.concept-img-tag .tag-text{font-size:11px;letter-spacing:2px;opacity:0.9;margin-top:4px}

.features{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:50px}
.feature-card{background:var(--cream);border-radius:12px;padding:28px 24px;text-align:center;border:1px solid var(--border);transition:all 0.4s ease;position:relative;overflow:hidden}
.feature-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(to right,var(--primary),var(--primary-light));transform:scaleX(0);transform-origin:left;transition:transform 0.4s ease}
.feature-card:hover::before{transform:scaleX(1)}
.feature-card:hover{transform:translateY(-6px);box-shadow:0 15px 40px rgba(0,0,0,0.1)}
.feature-icon{font-size:32px;margin-bottom:12px}
.feature-title{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:600;color:var(--dark);margin-bottom:8px}
.feature-desc{font-size:12px;color:var(--text-light);line-height:1.8}

/* ===== MENU ===== */
.menu-section{background:var(--section-bg);padding:100px 0}
.menu-header{text-align:center;margin-bottom:60px}
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
.menu-card{background:#fff;border-radius:16px;overflow:hidden;position:relative;transition:all 0.4s ease;border:1px solid var(--border)}
.menu-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:4px;background:linear-gradient(to right,var(--primary),var(--primary-light));transform:scaleX(0);transform-origin:left;transition:transform 0.4s ease;z-index:2}
.menu-card:hover::before{transform:scaleX(1)}
.menu-card:hover{transform:translateY(-8px);box-shadow:0 20px 50px rgba(0,0,0,0.12)}
.menu-card-img{height:200px;overflow:hidden;position:relative}
.menu-card-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s ease}
.menu-card:hover .menu-card-img img{transform:scale(1.08)}
.menu-card-body{padding:24px}
.menu-tag{display:inline-block;background:rgba(200,119,58,0.1);color:var(--primary);font-size:10px;letter-spacing:2px;padding:4px 12px;border-radius:20px;margin-bottom:12px;font-weight:500}
.menu-name{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:600;color:var(--dark);margin-bottom:10px;line-height:1.4}
.menu-desc{font-size:12px;color:var(--text-light);line-height:1.9;margin-bottom:16px}
.menu-price{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--primary)}
.menu-price span{font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:400;color:var(--text-light);margin-left:4px}
.menu-card-last{grid-column:span 3;display:grid;grid-template-columns:1fr 2fr;align-items:center}
.menu-card-last .menu-card-img{height:100%;min-height:180px}

/* ===== GALLERY ===== */
.gallery-section{padding:100px 0;background:var(--warm-white)}
.gallery-header{text-align:center;margin-bottom:60px}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto;gap:20px}
.gallery-item{position:relative;overflow:hidden;border-radius:12px;cursor:pointer}
.gallery-item:first-child{grid-column:span 2;height:380px}
.gallery-item:not(:first-child){height:230px}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s ease}
.gallery-item:hover img{transform:scale(1.1)}
.gallery-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,18,8,0.8) 0%,transparent 60%);opacity:0;transition:opacity 0.4s ease;display:flex;align-items:flex-end;padding:24px}
.gallery-item:hover .gallery-overlay{opacity:1}
.gallery-overlay-text{color:#fff;font-family:'Noto Serif JP',serif;font-size:15px;font-weight:500;letter-spacing:1px;transform:translateY(10px);transition:transform 0.4s ease}
.gallery-item:hover .gallery-overlay-text{transform:translateY(0)}

/* ===== STATS ===== */
.stats-section{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-light) 100%);padding:80px 0;position:relative;overflow:hidden}
.stats-bg-deco{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.06;pointer-events:none}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:40px;position:relative;z-index:1}
.stat-item{text-align:center;color:#fff}
.stat-num{font-family:'Playfair Display',serif;font-size:56px;font-weight:700;line-height:1;color:#fff;margin-bottom:8px}
.stat-unit{font-size:20px}
.stat-label{font-size:13px;letter-spacing:3px;opacity:0.85;margin-top:4px;font-weight:300}
.stat-divider{width:30px;height:1px;background:rgba(255,255,255,0.4);margin:12px auto}

/* ===== ACCESS ===== */
.access-section{padding:100px 0;background:var(--cream)}
.access-header{text-align:center;margin-bottom:60px}
.access-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
.access-info{display:flex;flex-direction:column;gap:24px}
.access-item{display:flex;gap:20px;padding:24px;background:#fff;border-radius:12px;border:1px solid var(--border);transition:all 0.3s}
.access-item:hover{box-shadow:0 8px 25px rgba(0,0,0,0.08);transform:translateY(-2px)}
.access-icon{width:48px;height:48px;min-width:48px;background:rgba(200,119,58,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.access-item-title{font-weight:600;font-size:13px;color:var(--text-light);letter-spacing:2px;margin-bottom:6px}
.access-item-text{font-size:15px;color:var(--dark);line-height:1.7;font-weight:400}
.access-map{border-radius:16px;overflow:hidden;height:400px;border:1px solid var(--border)}
.access-map iframe{width:100%;height:100%;border:none}

/* ===== CTA ===== */
.cta-section{padding:120px 0;background:var(--dark);position:relative;overflow:hidden;text-align:center}
.cta-bg-svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0.05}
.cta-content{position:relative;z-index:2}
.cta-label{font-size:11px;letter-spacing:6px;color:var(--primary-light);font-weight:500;text-transform:uppercase;display:block;margin-bottom:16px}
.cta-title{font-family:'Noto Serif JP',serif;font-size:clamp(24px,4vw,46px);font-weight:700;color:#fff;line-height:1.5;margin-bottom:24px}
.cta-text{font-size:15px;color:rgba(255,255,255,0.7);max-width:560px;margin:0 auto 50px;line-height:2;font-weight:300}
.cta-btns{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.btn-cta-main{display:inline-block;padding:18px 50px;background:var(--primary);color:#fff;text-decoration:none;font-size:15px;letter-spacing:3px;border-radius:50px;font-weight:500;position:relative;overflow:hidden;transition:all 0.3s ease}
.btn-cta-main::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:var(--primary-dark);transform:scaleX(0);transform-origin:left;transition:transform 0.4s ease;z-index:-1}
.btn-cta-main:hover::before{transform:scaleX(1)}
.btn-cta-main:hover{transform:translateY(-3px);box-shadow:0 12px 35px rgba(200,119,58,0.5)}
.cta-info{margin-top:50px;padding-top:50px;border-top:1px solid rgba(255,255,255,0.1)}
.cta-hours{display:flex;justify-content:center;gap:60px;flex-wrap:wrap}
.cta-hour-item{text-align:center;color:rgba(255,255,255,0.8)}
.cta-hour-label{font-size:11px;letter-spacing:3px;color:var(--primary-light);margin-bottom:8px}
.cta-hour-text{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:500}

/* ===== FOOTER ===== */
footer{background:#0d0a06;padding:60px 0 30px;color:rgba(255,255,255,0.7)}
.footer-inner{max-width:1200px;margin:0 auto;padding:0 40px}
.footer-top{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:60px;padding-bottom:50px;border-bottom:1px solid rgba(255,255,255,0.08)}
.footer-logo-main{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:8px}
.footer-logo-sub{font-size:11px;letter-spacing:4px;color:rgba(255,255,255,0.5);margin-bottom:20px}
.footer-desc{font-size:13px;line-height:2;color:rgba(255,255,255,0.6)}
.footer-col-title{font-weight:600;font-size:12px;letter-spacing:3px;color:var(--primary-light);margin-bottom:24px;text-transform:uppercase}
.footer-links{display:flex;flex-direction:column;gap:12px}
.footer-links a{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;transition:color 0.3s;letter-spacing:1px}
.footer-links a:hover{color:var(--primary-light)}
.footer-info-list{display:flex;flex-direction:column;gap:14px}
.footer-info-item{display:flex;gap:12px;align-items:flex-start}
.footer-info-icon{opacity:0.6;font-size:14px;margin-top:2px}
.footer-info-text{font-size:13px;line-height:1.7;color:rgba(255,255,255,0.6)}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:30px;flex-wrap:wrap;gap:16px}
.footer-copyright{font-size:12px;color:rgba(255,255,255,0.4)}
.footer-credit{font-size:12px;color:rgba(255,255,255,0.4)}
.footer-credit a{color:rgba(255,255,255,0.6);text-decoration:none;transition:color 0.3s}
.footer-credit a:hover{color:var(--primary-light)}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes rotateSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}}

.reveal{opacity:0;transform:translateY(50px);transition:opacity 0.8s ease,transform 0.8s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-50px);transition:opacity 0.8s ease,transform 0.8s ease}
.reveal-left.visible{opacity:1;transform:translateX(0)}
.reveal-right{opacity:0;transform:translateX(50px);transition:opacity 0.8s ease,transform 0.8s ease}
.reveal-right.visible{opacity:1;transform:translateX(0)}
.reveal-scale{opacity:0;transform:scale(0.9);transition:opacity 0.8s ease,transform 0.8s ease}
.reveal-scale.visible{opacity:1;transform:scale(1)}

.stagger-1{transition-delay:0.1s}
.stagger-2{transition-delay:0.2s}
.stagger-3{transition-delay:0.3s}
.stagger-4{transition-delay:0.4s}
.stagger-5{transition-delay:0.5s}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
.menu-grid{grid-template-columns:repeat(2,1fr)}
.menu-card-last{grid-column:span 2}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.concept-grid{gap:50px}
}
@media(max-width:768px){
nav{display:none}
.hamburger{display:flex}
.header-inner{padding:0 24px}
.hero-deco-tl,.hero-deco-tr{display:none}
.hero-scroll{display:none}
.section{padding:70px 0}
.container{padding:0 24px}
.concept-grid{grid-template-columns:1fr}
.concept-img-tag{left:16px;bottom:16px}
.features{grid-template-columns:1fr}
.menu-grid{grid-template-columns:1fr}
.menu-card-last{grid-column:span 1;grid-template-columns:1fr}
.menu-card-last .menu-card-img{height:200px}
.gallery-grid{grid-template-columns:1fr 1fr}
.gallery-item:first-child{grid-column:span 2;height:260px}
.gallery-item:not(:first-child){height:180px}
.stats-grid{grid-template-columns:repeat(2,1fr);gap:30px}
.stat-num{font-size:40px}
.access-grid{grid-template-columns:1fr}
.footer-top{grid-template-columns:1fr}
.footer-bottom{flex-direction:column;text-align:center}
.cta-hours{gap:40px}
.hero-btns{flex-direction:column;align-items:center}
.wave-divider svg{height:50px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-main">Little chef</span>
      <span class="logo-sub">MIYAZAKI · SHINTOMI</span>
    </div>
    <nav>
      <a href="#concept">コンセプト</a>
      <a href="#menu">メニュー</a>
      <a href="#gallery">ギャラリー</a>
      <a href="#access">アクセス</a>
      <a href="https://forms.gle/uSfk2teksDMiE6bQ7" class="header-cta" target="_blank">お問い合わせ</a>
    </nav>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </div>
</header>
