<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スナックTOKI | 新富町に、ほっとできる場所がある。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --gold-dark: #9a7a45;
    --dark: #1a1208;
    --dark2: #2c1f0e;
    --dark3: #3d2e1a;
    --cream: #fdf6e9;
    --cream2: #f5ead4;
    --text: #2c1f0e;
    --text-light: #7a6040;
    --white: #ffffff;
    --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--text);
    overflow-x: hidden;
    line-height: 1.8;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

  /* ===== HEADER ===== */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 0 40px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.5s ease, box-shadow 0.5s ease;
  }
  #header.scrolled {
    background: rgba(26, 18, 8, 0.96);
    backdrop-filter: blur(12px);
    box-shadow: 0 2px 30px rgba(201, 169, 110, 0.15);
  }
  .header-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 3px;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .header-logo span {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 4px;
    color: var(--gold-light);
    margin-top: 2px;
  }
  .header-nav {
    display: flex;
    align-items: center;
    gap: 36px;
    list-style: none;
  }
  .header-nav a {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 3px;
    color: var(--gold-light);
    text-decoration: none;
    position: relative;
    transition: color var(--transition);
  }
  .header-nav a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: var(--gold);
    transition: width var(--transition);
  }
  .header-nav a:hover { color: var(--gold); }
  .header-nav a:hover::after { width: 100%; }
  .header-tel {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--gold);
    text-decoration: none;
    border: 1px solid var(--gold-dark);
    padding: 8px 18px;
    border-radius: 2px;
    transition: all var(--transition);
    letter-spacing: 1px;
  }
  .header-tel:hover {
    background: var(--gold);
    color: var(--dark);
  }
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 26px;
    height: 1px;
    background: var(--gold);
    transition: all 0.3s ease;
  }
  .mobile-menu {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26, 18, 8, 0.98);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .mobile-menu.open { display: flex; opacity: 1; }
  .mobile-menu a {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 6px;
    color: var(--gold-light);
    text-decoration: none;
    transition: color 0.3s;
  }
  .mobile-menu a:hover { color: var(--gold); }
  .mobile-close {
    position: absolute;
    top: 24px; right: 24px;
    font-size: 28px;
    color: var(--gold);
    cursor: pointer;
    background: none;
    border: none;
  }

  /* ===== HERO ===== */
  #hero {
    position: relative;
    height: 100vh;
    min-height: 600px;
    overflow: hidden;
    background: var(--dark);
  }
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.2s ease;
    will-change: opacity;
  }
  .slide.active { opacity: 1; }
  .slide-bg {
    position: absolute;
    inset: -20%;
    background-size: cover;
    background-position: center;
    will-change: transform;
  }
  .slide:nth-child(1) .slide-bg { background-image: url('https://images.unsplash.com/photo-1646973960275-846577b11659?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w4OTA2ODN8MHwxfHJhbmRvbXx8fHx8fHx8fDE3NzMwMjYwMjl8&ixlib=rb-4.1.0&q=80&w=1080'); }
  .slide:nth-child(2) .slide-bg { background-image: url('https://images.unsplash.com/photo-1713018604654-51f531066e8d?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w4OTA2ODN8MHwxfHJhbmRvbXx8fHx8fHx8fDE3NzMwMjYwMjl8&ixlib=rb-4.1.0&q=80&w=1080'); }
  .slide:nth-child(3) .slide-bg { background-image: url('https://images.unsplash.com/photo-1768758498974-2f316f60da2d?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w4OTA2ODN8MHwxfHJhbmRvbXx8fHx8fHx8fDE3NzMwMjYwMjl8&ixlib=rb-4.1.0&q=80&w=1080'); }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(26,18,8,0.75) 0%, rgba(26,18,8,0.45) 50%, rgba(26,18,8,0.65) 100%);
    z-index: 2;
  }
  .hero-content {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 20px;
  }
  .hero-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 8px;
    color: var(--gold);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 1s 0.3s forwards;
  }
  .hero-title {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(32px, 5vw, 60px);
    font-weight: 300;
    color: var(--white);
    letter-spacing: 6px;
    line-height: 1.5;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s 0.6s forwards;
  }
  .hero-title em {
    font-style: normal;
    color: var(--gold);
  }
  .hero-line {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 28px;
    opacity: 0;
    animation: scaleX 1s 0.9s forwards;
    transform-origin: left;
  }
  .hero-sub {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 4px;
    color: var(--gold-light);
    opacity: 0;
    animation: fadeUp 1s 1.1s forwards;
  }
  .hero-scroll {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 1s 1.5s forwards;
  }
  .hero-scroll span {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--gold-light);
  }
  .scroll-line {
    width: 1px;
    height: 50px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: scrollPulse 2s infinite;
  }
  @keyframes scrollPulse {
    0% { transform: scaleY(0); transform-origin: top; }
    50% { transform: scaleY(1); transform-origin: top; }
    51% { transform: scaleY(1); transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; }
  }
  /* SVG dashed circle */
  .hero-deco-circle {
    position: absolute;
    bottom: -80px;
    right: -80px;
    z-index: 2;
    opacity: 0.25;
    animation: rotateSlow 30s linear infinite;
  }
  .hero-deco-circle2 {
    position: absolute;
    top: 60px;
    left: -60px;
    z-index: 2;
    opacity: 0.15;
    animation: rotateSlow 40s linear infinite reverse;
  }
  @keyframes rotateSlow { to { transform: rotate(360deg); } }

  /* Dots */
  .hero-dots {
    position: absolute;
    bottom: 36px;
    right: 40px;
    z-index: 4;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .hero-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(201,169,110,0.4);
    cursor: pointer;
    transition: all 0.4s;
    border: 1px solid var(--gold-dark);
  }
  .hero-dot.active {
    background: var(--gold);
    transform: scale(1.3);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleX {
    from { opacity: 0; transform: scaleX(0); }
    to { opacity: 1; transform: scaleX(1); }
  }

  /* ===== WAVE DIVIDER ===== */
  .wave-divider {
    display: block;
    width: 100%;
    overflow: hidden;
    line-height: 0;
  }
  .wave-divider svg { display: block; }

  /* ===== SECTION COMMON ===== */
  section { position: relative; }
  .section-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 40px;
  }
  .section-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .section-label::before {
    content: '';
    display: inline-block;
    width: 30px; height: 1px;
    background: var(--gold);
  }
  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(26px, 4vw, 44px);
    font-weight: 300;
    letter-spacing: 4px;
    line-height: 1.4;
    color: var(--dark);
    margin-bottom: 20px;
  }
  .section-title.light { color: var(--white); }
  .section-line {
    width: 50px; height: 2px;
    background: var(--gold);
    margin-bottom: 50px;
  }

  /* ===== ANIMATION CLASSES ===== */
  .anim-fade { opacity: 0; transform: translateY(40px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .anim-left { opacity: 0; transform: translateX(-50px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .anim-right { opacity: 0; transform: translateX(50px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .anim-scale { opacity: 0; transform: scale(0.85); transition: opacity 0.8s ease, transform 0.8s ease; }
  .anim-visible { opacity: 1 !important; transform: none !important; }
  .delay-1 { transition-delay: 0.1s !important; }
  .delay-2 { transition-delay: 0.2s !important; }
  .delay-3 { transition-delay: 0.3s !important; }
  .delay-4 { transition-delay: 0.4s !important; }
  .delay-5 { transition-delay: 0.5s !important; }

  /* ===== CONCEPT ===== */
  #concept {
    padding: 110px 0;
    background: var(--dark);
    position: relative;
    overflow: hidden;
  }
  .concept-bg-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 180px;
    font-weight: 600;
    color: rgba(201,169,110,0.04);
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 20px;
  }
  .concept-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .concept-img-wrap {
    position: relative;
  }
  .concept-img {
    width: 100%;
    aspect-ratio: 4/5;
    object-fit: cover;
    display: block;
    filter: brightness(0.9) saturate(0.9);
  }
  .concept-img-border {
    position: absolute;
    top: 20px; left: 20px;
    right: -20px; bottom: -20px;
    border: 1px solid var(--gold-dark);
    z-index: -1;
  }
  .concept-text .section-title { color: var(--cream); }
  .concept-body {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    font-weight: 300;
    line-height: 2.2;
    color: rgba(253,246,233,0.8);
    margin-bottom: 40px;
  }
  .concept-info {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .concept-info-row {
    display: flex;
    align-items: baseline;
    gap: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(201,169,110,0.2);
  }
  .concept-info-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    min-width: 80px;
  }
  .concept-info-value {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    color: var(--cream2);
    font-weight: 300;
    letter-spacing: 1px;
  }

  /* ===== MENU ===== */
  #menu {
    padding: 110px 0;
    background: var(--cream);
    position: relative;
    overflow: hidden;
  }
  .menu-header { text-align: center; margin-bottom: 60px; }
  .menu-header .section-line { margin: 0 auto 0; }
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .menu-card {
    background: var(--white);
    border: 1px solid rgba(201,169,110,0.2);
    padding: 36px 28px;
    position: relative;
    overflow: hidden;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    cursor: default;
  }
  .menu-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }
  .menu-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 50px rgba(201,169,110,0.2);
  }
  .menu-card:hover::before { transform: scaleX(1); }
  .menu-card-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .menu-card-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--dark2);
    letter-spacing: 2px;
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .menu-card-desc {
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.9;
    margin-bottom: 24px;
  }
  .menu-card-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--gold-dark);
    letter-spacing: 1px;
  }
  .menu-card-price sup { font-size: 16px; margin-right: 2px; }
  .menu-card-num {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px;
    font-weight: 600;
    color: rgba(201,169,110,0.06);
    line-height: 1;
    pointer-events: none;
  }

  /* ===== GALLERY ===== */
  #gallery {
    padding: 110px 0;
    background: var(--dark2);
    overflow: hidden;
  }
  .gallery-header { text-align: center; margin-bottom: 60px; }
  .gallery-header .section-title { color: var(--cream); }
  .gallery-header .section-line { margin: 0 auto; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: auto auto;
    gap: 12px;
  }
  .gallery-item {
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .gallery-item:nth-child(1) {
    grid-column: 1 / 3;
    grid-row: 1;
    aspect-ratio: 16/9;
  }
  .gallery-item:nth-child(2) {
    grid-column: 3;
    grid-row: 1;
    aspect-ratio: 1;
  }
  .gallery-item:nth-child(3) {
    grid-column: 1;
    grid-row: 2;
    aspect-ratio: 1;
  }
  .gallery-item:nth-child(4) {
    grid-column: 2 / 4;
    grid-row: 2;
    aspect-ratio: 16/9;
  }
  .gallery-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .gallery-item:hover .gallery-img { transform: scale(1.08); }
  .gallery-overlay {
    position: absolute;
    inset: 0;
    background: rgba(26,18,8,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .gallery-item:hover .gallery-overlay { opacity: 1; }
  .gallery-overlay-text {
    text-align: center;
    color: var(--cream);
  }
  .gallery-overlay-text p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 5px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .gallery-overlay-text h3 {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 3px;
  }

  /* ===== STATS ===== */
  #stats {
    padding: 100px 0;
    background: var(--cream2);
    overflow: hidden;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 40px;
    text-align: center;
  }
  .stat-item { position: relative; }
  .stat-item::after {
    content: '';
    position: absolute;
    right: 0; top: 20%;
    height: 60%;
    width: 1px;
    background: rgba(201,169,110,0.3);
  }
  .stat-item:last-child::after { display: none; }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px;
    font-weight: 600;
    color: var(--gold-dark);
    line-height: 1;
    margin-bottom: 8px;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
  }
  .stat-num .unit {
    font-size: 24px;
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
  }
  .stat-label {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--text-light);
    font-weight: 300;
  }

  /* ===== ACCESS ===== */
  #access {
    padding: 110px 0;
    background: var(--dark);
    overflow: hidden;
  }
  .access-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }
  .access-info { }
  .access-info .section-title { color: var(--cream); }
  .access-detail {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 40px;
  }
  .access-row {
    display: flex;
    gap: 20px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(201,169,110,0.15);
  }
  .access-icon {
    width: 40px; height: 40px;
    border: 1px solid var(--gold-dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--gold);
    font-size: 16px;
  }
  .access-row-content {}
  .access-row-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .access-row-value {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    color: var(--cream2);
    font-weight: 300;
    line-height: 1.8;
  }
  .access-map {
    border: 1px solid var(--gold-dark);
    overflow: hidden;
    aspect-ratio: 4/3;
  }
  .access-map iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    filter: grayscale(30%) sepia(10%);
  }

  /* ===== BUTTONS ===== */
  .btn-main {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 18px 44px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 4px;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: color var(--transition);
    cursor: pointer;
  }
  .btn-main::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform var(--transition);
    z-index: 0;
  }
  .btn-main:hover { color: var(--dark); }
  .btn-main:hover::before { transform: scaleX(1); }
