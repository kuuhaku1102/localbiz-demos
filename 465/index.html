<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小料理 愛菜 | 新富町の台所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #8B4513;
  --primary-light: #A0522D;
  --primary-dark: #5C2D0A;
  --accent: #C8860A;
  --accent-light: #E6A820;
  --bg: #FAF7F2;
  --bg-dark: #F0EBE1;
  --text: #2C1810;
  --text-light: #5A3E2B;
  --text-muted: #8B7355;
  --white: #FFFFFF;
  --border: #D4B896;
  --shadow: rgba(139, 69, 19, 0.15);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  line-height: 1.8;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

/* ===== HEADER ===== */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
  padding: 0 40px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(250, 247, 242, 0.0);
  backdrop-filter: blur(0px);
  transition: all 0.5s ease;
  border-bottom: 1px solid transparent;
}

header.scrolled {
  background: rgba(250, 247, 242, 0.96);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 20px var(--shadow);
}

.header-logo {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--white);
  text-decoration: none;
  letter-spacing: 0.1em;
  transition: color 0.5s ease;
}

header.scrolled .header-logo {
  color: var(--primary);
}

nav {
  display: flex;
  align-items: center;
  gap: 32px;
}

nav a {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  color: rgba(255,255,255,0.9);
  text-decoration: none;
  letter-spacing: 0.08em;
  position: relative;
  transition: color 0.3s ease;
}

header.scrolled nav a {
  color: var(--text-light);
}

nav a::after {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--accent);
  transition: width 0.3s ease;
}

nav a:hover::after { width: 100%; }
nav a:hover { color: var(--accent); }
header.scrolled nav a:hover { color: var(--accent); }

.header-tel {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  color: var(--white);
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.5);
  padding: 6px 16px;
  border-radius: 20px;
  transition: all 0.3s ease;
}

header.scrolled .header-tel {
  color: var(--primary);
  border-color: var(--primary);
}

.header-tel:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--white) !important;
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 5px;
}

.hamburger span {
  display: block;
  width: 25px;
  height: 2px;
  background: var(--white);
  transition: all 0.3s ease;
}

header.scrolled .hamburger span {
  background: var(--primary);
}

/* ===== HERO SLIDER ===== */
.hero {
  position: relative;
  height: 100vh;
  min-height: 600px;
  overflow: hidden;
}

.slider-container {
  position: relative;
  width: 100%;
  height: 100%;
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.2s ease;
}

.slide.active { opacity: 1; }

.slide-bg {
  width: 100%;
  height: 130%;
  object-fit: cover;
  object-position: center;
  position: absolute;
  top: -15%;
  left: 0;
  will-change: transform;
}

.slide-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(44, 24, 16, 0.65) 0%,
    rgba(139, 69, 19, 0.3) 50%,
    rgba(44, 24, 16, 0.55) 100%
  );
}

.hero-content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--white);
  z-index: 10;
  padding: 0 20px;
}

.hero-eyebrow {
  font-size: 0.8rem;
  letter-spacing: 0.3em;
  color: var(--accent-light);
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeInDown 1s ease 0.5s forwards;
  text-transform: uppercase;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
}

.hero-title {
  font-family: 'Shippori Mincho', serif;
  font-size: clamp(2.2rem, 5vw, 3.8rem);
  font-weight: 700;
  line-height: 1.4;
  letter-spacing: 0.1em;
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeInUp 1s ease 0.8s forwards;
  text-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.hero-subtitle {
  font-size: clamp(0.9rem, 2vw, 1.1rem);
  font-weight: 300;
  letter-spacing: 0.15em;
  margin-bottom: 40px;
  opacity: 0;
  animation: fadeInUp 1s ease 1.1s forwards;
  color: rgba(255,255,255,0.9);
  font-family: 'Noto Serif JP', serif;
}

.hero-buttons {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
  opacity: 0;
  animation: fadeInUp 1s ease 1.4s forwards;
}

/* ===== BUTTONS ===== */
.btn-primary {
  position: relative;
  display: inline-block;
  padding: 14px 36px;
  font-size: 0.9rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  color: var(--white);
  background: var(--primary);
  border: 2px solid var(--primary);
  text-decoration: none;
  overflow: hidden;
  transition: color 0.4s ease;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
}

.btn-primary::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: -1;
}

.btn-primary:hover::before { transform: scaleX(1); }
.btn-primary:hover { color: var(--white); border-color: var(--accent); }

.btn-secondary {
  position: relative;
  display: inline-block;
  padding: 14px 36px;
  font-size: 0.9rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  color: var(--white);
  background: transparent;
  border: 2px solid rgba(255,255,255,0.7);
  text-decoration: none;
  overflow: hidden;
  transition: color 0.4s ease, border-color 0.4s ease;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
}

.btn-secondary::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.15);
  transform: scaleY(0);
  transform-origin: bottom;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: -1;
}

.btn-secondary:hover::before { transform: scaleY(1); }
.btn-secondary:hover { border-color: var(--white); }

.btn-dark {
  position: relative;
  display: inline-block;
  padding: 16px 48px;
  font-size: 0.95rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  color: var(--white);
  background: var(--primary);
  border: 2px solid var(--primary);
  text-decoration: none;
  overflow: hidden;
  transition: color 0.4s ease;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
}

.btn-dark::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--primary-dark);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: -1;
}

.btn-dark:hover::before { transform: scaleX(1); }

/* ===== SLIDER DOTS ===== */
.slider-dots {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  gap: 10px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  cursor: pointer;
  transition: all 0.3s ease;
  border: 1px solid rgba(255,255,255,0.6);
}

.dot.active {
  background: var(--accent-light);
  width: 24px;
  border-radius: 4px;
  border-color: var(--accent-light);
}

/* ===== SVG DASHED CIRCLE ===== */
.hero-deco-circle {
  position: absolute;
  z-index: 5;
  pointer-events: none;
}

.hero-deco-circle.top-right {
  top: 60px;
  right: 60px;
  animation: rotateSlow 20s linear infinite;
}

.hero-deco-circle.bottom-left {
  bottom: 80px;
  left: 60px;
  animation: rotateSlow 25s linear infinite reverse;
}

@keyframes rotateSlow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== WAVE DIVIDER ===== */
.wave-divider {
  position: relative;
  width: 100%;
  overflow: hidden;
  line-height: 0;
}

.wave-divider svg {
  display: block;
  width: 100%;
}

/* ===== SECTIONS ===== */
section {
  padding: 100px 0;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 40px;
}

.section-label {
  display: inline-block;
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 12px;
  font-weight: 500;
  position: relative;
  padding-left: 30px;
}

.section-label::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 1px;
  background: var(--accent);
}

.section-title {
  font-family: 'Shippori Mincho', serif;
  font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
  letter-spacing: 0.05em;
  margin-bottom: 20px;
}

.section-desc {
  font-size: 0.95rem;
  color: var(--text-muted);
  line-height: 1.9;
  max-width: 580px;
}

/* ===== CONCEPT SECTION ===== */
.concept {
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

.concept-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}

.concept-image-wrap {
  position: relative;
  height: 520px;
}

.concept-img-main {
  width: 75%;
  height: 85%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  box-shadow: 20px 20px 60px var(--shadow);
}

.concept-img-sub {
  width: 55%;
  height: 55%;
  object-fit: cover;
  position: absolute;
  bottom: 0;
  right: 0;
  box-shadow: 20px 20px 60px var(--shadow);
  border: 6px solid var(--bg);
}

.concept-badge {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90px;
  height: 90px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 5;
  box-shadow: 0 8px 30px rgba(200, 134, 10, 0.4);
}

.concept-badge span {
  font-family: 'Shippori Mincho', serif;
  font-size: 0.65rem;
  color: var(--white);
  letter-spacing: 0.1em;
  text-align: center;
  line-height: 1.6;
}

.concept-features {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 36px;
}

.concept-feature {
  display: flex;
  align-items: flex-start;
  gap: 16px;
}

.feature-icon {
  width: 44px;
  height: 44px;
  min-width: 44px;
  background: var(--bg-dark);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  border: 1px solid var(--border);
}

.feature-text h4 {
  font-family: 'Shippori Mincho', serif;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

.feature-text p {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ===== MENU SECTION ===== */
.menu-section {
  background: var(--bg-dark);
  position: relative;
  overflow: hidden;
}

.menu-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px;
  margin-top: 60px;
}

.menu-card {
  background: var(--white);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  box-shadow: 0 4px 20px var(--shadow);
  cursor: pointer;
}

.menu-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transition: width 0.4s ease;
  z-index: 1;
}

.menu-card:hover::before { width: 100%; }

.menu-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 50px var(--shadow);
}

.menu-card-body {
  padding: 32px 28px;
}

.menu-number {
  font-size: 0.7rem;
  letter-spacing: 0.25em;
  color: var(--accent);
  margin-bottom: 12px;
  font-weight: 500;
}

.menu-name {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: 0.05em;
}

.menu-desc {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.8;
  margin-bottom: 20px;
}

.menu-price {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 0.02em;
}

.menu-price span {
  font-size: 0.75rem;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text-muted);
  margin-left: 4px;
}

.menu-divider {
  width: 30px;
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

/* ===== GALLERY SECTION ===== */
.gallery-section {
  background: var(--bg);
  position: relative;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 60px;
}

.gallery-grid .gallery-item:first-child {
  grid-column: span 2;
  grid-row: span 2;
}

.gallery-item {
  position: relative;
  overflow: hidden;
  border-radius: 2px;
  cursor: pointer;
  aspect-ratio: 1;
}

.gallery-grid .gallery-item:first-child {
  aspect-ratio: unset;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.gallery-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(44, 24, 16, 0.85) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s ease;
  display: flex;
  align-items: flex-end;
  padding: 24px;
}

.gallery-overlay-text {
  color: var(--white);
  font-family: 'Shippori Mincho', serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  transform: translateY(10px);
  transition: transform 0.4s ease;
}

.gallery-item:hover img { transform: scale(1.08); }
.gallery-item:hover .gallery-overlay { opacity: 1; }
.gallery-item:hover .gallery-overlay-text { transform: translateY(0); }

/* ===== STATS SECTION ===== */
.stats-section {
  background: var(--primary-dark);
  color: var(--white);
  position: relative;
  overflow: hidden;
  padding: 80px 0;
}

.stats-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 40px;
  position: relative;
  z-index: 1;
}

.stat-item {
  text-align: center;
  padding: 20px;
  border-right: 1px solid rgba(255,255,255,0.1);
}

.stat-item:last-child { border-right: none; }

.stat-number {
  font-family: 'Shippori Mincho', serif;
  font-size: 3.5rem;
  font-weight: 700;
  color: var(--accent-light);
  line-height: 1;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.stat-unit {
  font-size: 1.2rem;
  color: var(--accent-light);
}

.stat-label {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.1em;
  font-weight: 300;
  margin-top: 8px;
}

/* ===== ACCESS SECTION ===== */
.access-section {
  background: var(--bg-dark);
  position: relative;
}

.access-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: start;
}

.access-info {
  padding: 40px 0;
}

.access-info h3 {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 28px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.access-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.access-list li {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  font-size: 0.9rem;
  color: var(--text-light);
}

.access-list .access-icon {
  width: 36px;
  height: 36px;
  min-width: 36px;
  background: var(--primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
}

.access-list .info-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  display: block;
  margin-bottom: 2px;
}

.access-list .info-value {
  font-size: 0.9rem;
  color: var(--text);
  font-weight: 500;
}

.access-list .info-value a {
  color: var(--primary);
  text-decoration: none;
  transition: color 0.3s;
}

.access-list .info-value a:hover {
  color: var(--accent);
  text-decoration: underline;
}

.map-wrap {
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 10px 40px var(--shadow);
  height: 400px;
  background: var(--border);
  position: relative;
}

.map-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--bg-dark), var(--border));
  gap: 12px;
}

.map-placeholder .map-icon {
  font-size: 3rem;
  opacity: 0.5;
}

.map-placeholder p {
  font-size: 0.85rem;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.8;
}

/* ===== CTA SECTION ===== */
.cta-section {
  background: var(--primary);
  color: var(--white);
  position: relative;
  overflow: hidden;
  padding: 100px 0;
  text-align: center;
}

.cta-bg-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0.08;
  pointer-events: none;
}

.cta-inner {
  position: relative;
  z-index: 2;
}

.cta-label {
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  color: var(--accent-light);
  text-transform: uppercase;
  margin-bottom: 20px;
  font-weight: 500;
}

.cta-title {
  font-family: 'Shippori Mincho', serif;
  font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  font-weight: 700;
  color: var(--white);
  margin-bottom: 20px;
  line-height: 1.5;
  letter-spacing: 0.05em;
}

.cta-desc {
  font-size: 0.95rem;
  color: rgba(255,255,255,0.8);
  margin-bottom: 48px;
  letter-spacing: 0.08em;
  line-height: 1.9;
}

.cta-buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}
