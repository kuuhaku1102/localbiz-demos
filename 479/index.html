<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花恋 | 宮崎県新富町のレストラン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--primary:#c8715a;
--primary-light:#e8a898;
--primary-dark:#a0503c;
--accent:#8b5e3c;
--accent-light:#d4a574;
--bg:#fdf8f4;
--bg-dark:#f5ede4;
--text:#2c1a0e;
--text-light:#6b4c3b;
--text-muted:#9c7b6c;
--white:#ffffff;
--gold:#b8960c;
--gold-light:#e8d080;
}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.7}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
ul{list-style:none}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--primary-light);border-radius:3px}

/* ===================== HEADER ===================== */
.header{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 40px;height:80px;display:flex;align-items:center;justify-content:space-between;transition:all .4s ease;background:transparent}
.header.scrolled{background:rgba(253,248,244,.97);backdrop-filter:blur(10px);box-shadow:0 2px 20px rgba(200,113,90,.12)}
.logo{font-family:'Noto Serif JP',serif;font-size:1.8rem;font-weight:600;color:var(--white);letter-spacing:.1em;transition:color .4s}
.header.scrolled .logo{color:var(--primary)}
.logo span{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;display:block;letter-spacing:.3em;font-weight:300;opacity:.8}
.nav{display:flex;align-items:center;gap:32px}
.nav a{font-size:.85rem;letter-spacing:.12em;color:rgba(255,255,255,.9);transition:color .3s;position:relative;padding-bottom:4px}
.nav a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--primary-light);transition:width .3s}
.nav a:hover::after{width:100%}
.header.scrolled .nav a{color:var(--text-light)}
.nav a:hover{color:var(--primary-light)}
.header.scrolled .nav a:hover{color:var(--primary)}
.nav-cta{background:var(--primary);color:var(--white)!important;padding:10px 22px;border-radius:30px;font-size:.82rem;letter-spacing:.1em;transition:all .3s!important}
.nav-cta:hover{background:var(--primary-dark)!important;transform:translateY(-1px)}
.nav-cta::after{display:none!important}
.hamburger{display:none;flex-direction:column;gap:6px;cursor:pointer;padding:5px}
.hamburger span{display:block;width:26px;height:2px;background:var(--white);border-radius:2px;transition:all .3s}
.header.scrolled .hamburger span{background:var(--text)}
.mobile-nav{display:none;position:fixed;top:0;right:-100%;width:280px;height:100vh;background:var(--white);z-index:1100;padding:100px 40px 40px;transition:right .4s ease;box-shadow:-5px 0 30px rgba(0,0,0,.1)}
.mobile-nav.open{right:0}
.mobile-nav a{display:block;font-size:1rem;color:var(--text);padding:14px 0;border-bottom:1px solid var(--bg-dark);letter-spacing:.1em}
.mobile-nav-close{position:absolute;top:25px;right:25px;font-size:1.5rem;cursor:pointer;color:var(--text-muted);line-height:1}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1050}
.overlay.show{display:block}

/* ===================== HERO ===================== */
.hero{position:relative;height:100vh;min-height:600px;overflow:hidden}
.hero-slider{position:relative;width:100%;height:100%}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease}
.hero-slide.active{opacity:1}
.hero-slide img{width:100%;height:130%;object-fit:cover;object-position:center;will-change:transform}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(44,26,14,.65) 0%,rgba(44,26,14,.3) 60%,rgba(200,113,90,.15) 100%)}
.hero-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:0 8% 80px;z-index:10}
.hero-label{font-size:.75rem;letter-spacing:.4em;color:var(--gold-light);text-transform:uppercase;margin-bottom:20px;opacity:0;animation:fadeUp .8s ease .5s forwards}
.hero-title{font-family:'Noto Serif JP',serif;font-size:clamp(2.2rem,5vw,3.8rem);color:var(--white);line-height:1.4;font-weight:400;margin-bottom:24px;opacity:0;animation:fadeUp .8s ease .8s forwards}
.hero-title em{font-style:normal;color:var(--gold-light)}
.hero-sub{font-size:clamp(.9rem,1.5vw,1.05rem);color:rgba(255,255,255,.85);letter-spacing:.08em;margin-bottom:40px;line-height:1.9;opacity:0;animation:fadeUp .8s ease 1.1s forwards}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap;opacity:0;animation:fadeUp .8s ease 1.4s forwards}
.btn-primary{position:relative;display:inline-flex;align-items:center;gap:8px;padding:16px 36px;background:var(--primary);color:var(--white);font-family:'Noto Serif JP',serif;font-size:.9rem;letter-spacing:.15em;border:none;cursor:pointer;overflow:hidden;border-radius:2px;transition:color .35s}
.btn-primary::before{content:'';position:absolute;inset:0;background:var(--primary-dark);transform:scaleX(0);transform-origin:left;transition:transform .35s ease}
.btn-primary:hover::before{transform:scaleX(1)}
.btn-primary span{position:relative;z-index:1}
.btn-secondary{position:relative;display:inline-flex;align-items:center;gap:8px;padding:15px 36px;background:transparent;color:var(--white);font-family:'Noto Serif JP',serif;font-size:.9rem;letter-spacing:.15em;border:1.5px solid rgba(255,255,255,.6);cursor:pointer;overflow:hidden;border-radius:2px;transition:color .35s,border-color .35s}
.btn-secondary::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.12);transform:scaleY(0);transform-origin:bottom;transition:transform .35s ease}
.btn-secondary:hover::before{transform:scaleY(1)}
.btn-secondary span{position:relative;z-index:1}
.btn-secondary:hover{border-color:rgba(255,255,255,.9)}
.hero-dots{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:20}
.hero-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:all .3s;border:none}
.hero-dot.active{background:var(--white);transform:scale(1.3)}

/* SVG Dashed Circle */
.hero-deco{position:absolute;top:10%;right:8%;width:200px;height:200px;z-index:5;opacity:.3;animation:spin 30s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.hero-deco2{position:absolute;bottom:15%;left:5%;width:120px;height:120px;z-index:5;opacity:.2;animation:spin 20s linear infinite reverse}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ===================== WAVE DIVIDER ===================== */
.wave-divider{line-height:0;margin-top:-2px;overflow:hidden}
.wave-divider svg{display:block;width:100%}

/* ===================== SECTION COMMON ===================== */
.section{padding:100px 0}
.container{max-width:1200px;margin:0 auto;padding:0 40px}
.section-header{text-align:center;margin-bottom:70px}
.section-tag{display:inline-block;font-size:.72rem;letter-spacing:.4em;color:var(--primary);text-transform:uppercase;margin-bottom:16px;position:relative}
.section-tag::before,.section-tag::after{content:'—';margin:0 8px;color:var(--primary-light)}
.section-title{font-family:'Noto Serif JP',serif;font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:400;color:var(--text);line-height:1.4;margin-bottom:16px}
.section-title em{font-style:normal;color:var(--primary)}
.section-sub{font-size:.9rem;color:var(--text-muted);letter-spacing:.06em;line-height:1.9;max-width:600px;margin:0 auto}
.ornament{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:20px}
.ornament-line{width:40px;height:1px;background:var(--primary-light)}
.ornament-diamond{width:6px;height:6px;background:var(--primary);transform:rotate(45deg)}

/* SCROLL ANIMATIONS */
.fade-up{opacity:0;transform:translateY(50px);transition:opacity .8s ease,transform .8s ease}
.fade-left{opacity:0;transform:translateX(-50px);transition:opacity .8s ease,transform .8s ease}
.fade-right{opacity:0;transform:translateX(50px);transition:opacity .8s ease,transform .8s ease}
.scale-in{opacity:0;transform:scale(.9);transition:opacity .8s ease,transform .8s ease}
.visible{opacity:1!important;transform:none!important}

/* ===================== CONCEPT ===================== */
.concept{background:var(--white)}
.concept-inner{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.concept-image-wrap{position:relative}
.concept-img-main{width:100%;height:520px;object-fit:cover;border-radius:4px}
.concept-img-accent{position:absolute;bottom:-30px;right:-30px;width:200px;height:200px;object-fit:cover;border-radius:4px;border:6px solid var(--white);box-shadow:0 10px 40px rgba(200,113,90,.2)}
.concept-badge{position:absolute;top:-20px;left:-20px;width:90px;height:90px;background:var(--primary);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;color:var(--white);font-size:.6rem;letter-spacing:.15em;text-align:center;line-height:1.4}
.concept-text{padding-right:20px}
.concept-text .section-tag{display:block;text-align:left;margin-bottom:12px}
.concept-text .section-tag::before{display:none}
.concept-text .section-tag::after{display:none}
.concept-heading{font-family:'Noto Serif JP',serif;font-size:clamp(1.5rem,2.5vw,2rem);font-weight:400;color:var(--text);line-height:1.6;margin-bottom:28px}
.concept-body{font-size:.92rem;color:var(--text-light);line-height:2.1;margin-bottom:36px}
.concept-features{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:36px}
.concept-feat{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text-light);letter-spacing:.06em}
.concept-feat::before{content:'✿';color:var(--primary);font-size:1rem}

/* ===================== MENU ===================== */
.menu{background:var(--bg)}
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
.menu-card{background:var(--white);border-radius:6px;overflow:hidden;box-shadow:0 4px 20px rgba(200,113,90,.08);transition:transform .4s ease,box-shadow .4s ease;position:relative}
.menu-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary);transform:scaleX(0);transform-origin:left;transition:transform .4s ease;z-index:2}
.menu-card:hover{transform:translateY(-8px);box-shadow:0 16px 48px rgba(200,113,90,.18)}
.menu-card:hover::before{transform:scaleX(1)}
.menu-card-body{padding:28px 24px}
.menu-icon{width:48px;height:48px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:1.4rem}
.menu-name{font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:600;color:var(--text);margin-bottom:8px}
.menu-desc{font-size:.82rem;color:var(--text-muted);line-height:1.8;margin-bottom:16px}
.menu-price{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--primary);font-weight:400;letter-spacing:.05em}
.menu-price span{font-size:.75rem;font-family:'Noto Sans JP',sans-serif;color:var(--text-muted)}

/* ===================== GALLERY ===================== */
.gallery{background:var(--white)}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:16px}
.gallery-item{position:relative;overflow:hidden;border-radius:4px;cursor:pointer}
.gallery-item:first-child{grid-column:span 2;grid-row:span 2}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.gallery-item:first-child img{min-height:480px}
.gallery-item:not(:first-child) img{min-height:220px}
.gallery-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(44,26,14,.7) 0%,transparent 60%);opacity:0;transition:opacity .4s ease;display:flex;align-items:flex-end;padding:24px}
.gallery-overlay-text{font-family:'Noto Serif JP',serif;font-size:.9rem;color:var(--white);letter-spacing:.1em;transform:translateY(10px);transition:transform .4s ease}
.gallery-item:hover img{transform:scale(1.08)}
.gallery-item:hover .gallery-overlay{opacity:1}
.gallery-item:hover .gallery-overlay-text{transform:translateY(0)}

/* ===================== STATS ===================== */
.stats{background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 50%,var(--accent) 100%);padding:80px 0;position:relative;overflow:hidden}
.stats-bg-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;opacity:.06}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:40px;position:relative;z-index:2}
.stat-item{text-align:center;color:var(--white)}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,4vw,3.8rem);font-weight:300;line-height:1;margin-bottom:8px;color:var(--gold-light)}
.stat-unit{font-size:.9rem;color:rgba(255,255,255,.7)}
.stat-label{font-size:.8rem;letter-spacing:.12em;color:rgba(255,255,255,.75);margin-top:8px}
.stat-divider{width:30px;height:1px;background:rgba(255,255,255,.3);margin:12px auto}

/* ===================== ACCESS ===================== */
.access{background:var(--bg)}
.access-inner{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
.access-info{padding-right:20px}
.access-detail{margin-bottom:40px}
.access-row{display:flex;gap:20px;padding:20px 0;border-bottom:1px solid var(--bg-dark)}
.access-row:last-child{border-bottom:none}
.access-label{font-size:.78rem;letter-spacing:.15em;color:var(--primary);min-width:80px;padding-top:2px;font-weight:500}
.access-value{font-size:.92rem;color:var(--text-light);line-height:1.7}
.access-value a{color:var(--primary);transition:color .3s}
.access-value a:hover{color:var(--primary-dark)}
.access-map{border-radius:8px;overflow:hidden;box-shadow:0 8px 32px rgba(200,113,90,.15);height:380px}
.access-map iframe{width:100%;height:100%;border:0}

/* ===================== CTA ===================== */
.cta-section{position:relative;padding:120px 0;background:var(--text);overflow:hidden;text-align:center}
.cta-concentric{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.05}
.cta-content{position:relative;z-index:2}
.cta-tag{font-size:.72rem;letter-spacing:.4em;color:var(--primary-light);text-transform:uppercase;margin-bottom:20px}
.cta-title{font-family:'Noto Serif JP',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);color:var(--white);font-weight:300;line-height:1.6;margin-bottom:16px}
.cta-sub{font-size:.9rem;color:rgba(255,255,255,.6);margin-bottom:12px;letter-spacing:.06em}
.cta-phone{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3rem);color:var(--gold-light);letter-spacing:.1em;margin-bottom:8px;display:block}
.cta-phone:hover{color:var(--gold)}
.cta-hours{font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:48px;letter-spacing:.08em}
.cta-btns{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.cta-btn-main{position:relative;display:inline-flex;align-items:center;gap:10px;padding:18px 44px;background:var(--primary);color:var(--white);font-family:'Noto Serif JP',serif;font-size:.95rem;letter-spacing:.15em;overflow:hidden;border-radius:2px;transition:color .35s}
.cta-btn-main::before{content:'';position:absolute;inset:0;background:var(--primary-dark);transform:scaleX(0);transform-origin:left;transition:transform .35s ease}
.cta-btn-main:hover::before{transform:scaleX(1)}
.cta-btn-main span{position:relative;z-index:1}
.cta-btn-sub{position:relative;display:inline-flex;align-items:center;gap:10px;padding:17px 44px;background:transparent;color:var(--white);font-family:'Noto Serif JP',serif;font-size:.95rem;letter-spacing:.15em;border:1.5px solid rgba(255,255,255,.4);overflow:hidden;border-radius:2px;transition:color .35s,border-color .35s}
.cta-btn-sub::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.08);transform:scaleY(0);transform-origin:bottom;transition:transform .35s ease}
.cta-btn-sub:hover::before{transform:scaleY(1)}
.cta-btn-sub:hover{border-color:rgba(255,255,255,.7)}
.cta-btn-sub span{position:relative;z-index:1}

/* ===================== FOOTER ===================== */
.footer{background:#1a0e08;padding:70px 0 30px;color:rgba(255,255,255,.5)}
.footer-inner{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:60px;margin-bottom:50px}
.footer-brand .logo{color:var(--primary-light);font-size:1.5rem;margin-bottom:12px;display:block}
.footer-brand p{font-size:.82rem;color:rgba(255,255,255,.35);line-height:1.9;margin-bottom:20px}
.footer-social{display:flex;gap:10px}
.footer-social a{width:36px;height:36px;border:1px solid rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:rgba(255,255,255,.5);transition:all .3s}
.footer-social a:hover{border-color:var(--primary);color:var(--primary)}
.footer-col-title{font-family:'Noto Serif JP',serif;font-size:.82rem;letter-spacing:.2em;color:rgba(255,255,255,.6);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08)}
.footer-col ul li{margin-bottom:10px}
.footer-col ul li a{font-size:.82rem;color:rgba(255,255,255,.4);transition:color .3s;display:flex;align-items:center;gap:6px}
.footer-col ul li a::before{content:'›';color:var(--primary-light);font-size:1rem}
.footer-col ul li a:hover{color:var(--primary-light)}
.footer-info-row{display:flex;gap:10px;margin-bottom:10px;font-size:.82rem}
.footer-info-icon{color:var(--primary-light);min-width:16px}
.footer-bottom{border-top:1px solid rgba(255,255,255,.06);padding-top:25px;display:flex;justify-content:space-between;align-items:center;flex-wrap:gap}
.footer-copy{font-size:.75rem;color:rgba(255,255,255,.25);letter-spacing:.08em}
.footer-credit a{font-size:.75rem;color:rgba(255,255,255,.3);letter-spacing:.05em;transition:color .3s}
.footer-credit a:hover{color:var(--primary-light)}

/* ===================== RESPONSIVE ===================== */
@media(max-width:1024px){
.menu-grid{grid-template-columns:repeat(2,1fr)}
.stats-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){
.concept-inner{grid-template-columns:1fr;gap:50px}
.concept-text{padding-right:0}
.access-inner{grid-template-columns:1fr;gap:40px}
.footer-inner{grid-template-columns:1fr 1fr;gap:40px}
}
@media(max-width:768px){
.header{padding:0 20px;height:70px}
.nav{display:none}
.hamburger{display:flex}
.hero-content{padding:0 6% 60px}
.section{padding:70px 0}
.container{padding:0 20px}
.menu-grid{grid-template-columns:1fr}
.gallery-grid{grid-template-columns:1fr 1fr}
.gallery-item:first-child{grid-column:span 2;grid-row:span 1}
.gallery-item:first-child img{min-height:200px}
.stats-grid{grid-template-columns:repeat(2,1fr);gap:24px}
.footer-inner{grid-template-columns:1fr;gap:30px}
.footer-bottom{flex-direction:column;gap:10px;text-align:center}
.hero-deco{width:120px;height:120px;top:15%;right:5%}
.concept-img-accent{display:none}
}
@media(max-width:480px){
.hero-btns{flex-direction:column}
.cta-btns{flex-direction:column;align-items:center}
.gallery-grid{grid-template-columns:1fr}
.gallery-item:first-child{grid-column:span 1}
.stats-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header" id="header">
  <a href="#" class="logo">花恋<span>Karen Restaurant</span></a>
  <nav class="nav">
    <a href="#concept">コンセプト</a>
    <a href="#menu">メニュー</a>
    <a href="#gallery">ギャラリー</a>
    <a href="#access">アクセス</a>
    <a href="https://forms.gle/uSfk2teksDMiE6bQ7" class="nav-cta" target="_blank">ご予約</a>
  </nav>
  <div class="hamburger" id="hamburger">
    <span></span><span></span><span></span>
  </div>
</header>

<div class="overlay" id="overlay"></div>
<nav class="mobile-nav" id="mobileNav">
  <div class="mobile-nav-close" id="mobileClose">✕</div>
  <a href="#concept">コンセプト</a>
  <a href="#menu">メニュー</a>
  <a href="#gallery">ギャラリー</a>
  <a href="#access">アクセス</a>
  <a href="https://forms.gle/uSfk2teksDMiE6bQ7" target="_blank">ご予約・お問い合わせ</a>
  <a href="tel:0983-33-1578">📞 0983-33-1578</a>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-slider">
    <div class="hero-slide active">
      <img src="https://images.unsplash.com/photo-1560724760-fe1a7951db7e?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w4OTA2ODN8MHwxfHJhbmRvbXx8fHx8fHx8fDE3NzMwMjU1ODl8&ixlib=rb-4.1.0&q=80&w=1080" alt="花恋の雰囲気" class="parallax-img">
