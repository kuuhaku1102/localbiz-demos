<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しんとみの郷 | 新富の大地が育む、ふるさとの味。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#5a7a3a;
  --primary-light:#7a9f54;
  --primary-dark:#3d5528;
  --accent:#c8860a;
  --accent-light:#e8a832;
  --bg:#faf8f3;
  --bg2:#f2ede3;
  --text:#2c2416;
  --text-light:#6b5f4e;
  --white:#ffffff;
  --border:#d9d0be;
  --shadow:rgba(44,36,22,0.12);
  --font-serif:'Shippori Mincho','Noto Serif JP',serif;
  --font-sans:'Noto Sans JP',sans-serif;
}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.7}
img{max-width:100%;height:auto;display:block}
a{text-decoration:none;color:inherit}
ul{list-style:none}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--primary-light);border-radius:3px}

/* ===== HEADER ===== */
#header{
  position:fixed;top:0;left:0;width:100%;z-index:1000;
  transition:background 0.4s,box-shadow 0.4s,padding 0.4s;
  padding:20px 0;
}
#header.scrolled{
  background:rgba(250,248,243,0.96);
  backdrop-filter:blur(12px);
  box-shadow:0 2px 20px var(--shadow);
  padding:12px 0;
}
.header-inner{
  max-width:1200px;margin:0 auto;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-family:var(--font-serif);font-size:1.5rem;font-weight:700;
  color:var(--white);letter-spacing:0.08em;
  transition:color 0.4s;
  display:flex;align-items:center;gap:10px;
}
#header.scrolled .logo{color:var(--primary-dark)}
.logo-icon{
  width:36px;height:36px;background:var(--primary);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;color:var(--white);flex-shrink:0;
  transition:background 0.4s;
}
#header.scrolled .logo-icon{background:var(--primary)}
nav{display:flex;align-items:center;gap:32px}
.nav-link{
  font-size:0.875rem;font-weight:500;letter-spacing:0.06em;
  color:rgba(255,255,255,0.9);position:relative;padding:4px 0;
  transition:color 0.3s;
}
#header.scrolled .nav-link{color:var(--text-light)}
.nav-link::after{
  content:'';position:absolute;bottom:0;left:0;width:0;height:1px;
  background:var(--accent);transition:width 0.3s;
}
.nav-link:hover::after{width:100%}
.nav-link:hover{color:var(--accent)}
#header.scrolled .nav-link:hover{color:var(--accent)}
.nav-cta{
  position:relative;overflow:hidden;
  background:var(--accent);color:var(--white)!important;
  padding:8px 20px;border-radius:24px;
  font-size:0.8125rem;font-weight:700;letter-spacing:0.08em;
  transition:transform 0.2s,box-shadow 0.2s;
}
.nav-cta::before{
  content:'';position:absolute;inset:0;
  background:var(--primary-dark);
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.35s ease;border-radius:24px;
}
.nav-cta span{position:relative;z-index:1}
.nav-cta:hover::before{transform:scaleX(1)}
.nav-cta:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(200,134,10,0.4)}
.nav-cta::after{display:none!important}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.hamburger span{display:block;width:24px;height:2px;background:var(--white);transition:all 0.3s;border-radius:2px}
#header.scrolled .hamburger span{background:var(--text)}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-nav{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(250,248,243,0.98);backdrop-filter:blur(16px);
  z-index:999;flex-direction:column;align-items:center;justify-content:center;
  gap:32px;
}
.mobile-nav.open{display:flex}
.mobile-nav .nav-link{color:var(--text);font-size:1.25rem;font-weight:600}
.mobile-nav .nav-link::after{background:var(--accent)}

/* ===== HERO ===== */
#hero{
  position:relative;width:100%;height:100vh;min-height:600px;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
}
.hero-slider{position:absolute;inset:0;z-index:0}
.hero-slide{
  position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease;
  will-change:opacity;
}
.hero-slide.active{opacity:1}
.hero-slide-img{
  width:100%;height:120%;object-fit:cover;object-position:center;
  transform:translateY(0);will-change:transform;
}
.hero-overlay{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(135deg,rgba(44,36,22,0.65) 0%,rgba(61,85,40,0.45) 100%);
}
.hero-content{
  position:relative;z-index:3;text-align:center;color:var(--white);
  padding:0 24px;max-width:800px;
}
.hero-badge{
  display:inline-block;
  background:rgba(200,134,10,0.9);color:var(--white);
  font-size:0.75rem;letter-spacing:0.15em;font-weight:700;
  padding:6px 20px;border-radius:20px;margin-bottom:28px;
  backdrop-filter:blur(4px);
  animation:fadeInDown 1s ease 0.3s both;
}
.hero-title{
  font-family:var(--font-serif);font-size:clamp(2.2rem,5vw,3.8rem);
  font-weight:700;line-height:1.35;letter-spacing:0.06em;
  margin-bottom:20px;
  animation:fadeInUp 1s ease 0.5s both;
  text-shadow:0 2px 20px rgba(0,0,0,0.3);
}
.hero-sub{
  font-size:clamp(0.95rem,2vw,1.125rem);font-weight:300;
  letter-spacing:0.12em;opacity:0.9;margin-bottom:44px;
  animation:fadeInUp 1s ease 0.7s both;
}
.hero-btns{
  display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
  animation:fadeInUp 1s ease 0.9s both;
}
.btn-main{
  position:relative;overflow:hidden;
  background:var(--accent);color:var(--white);
  padding:14px 36px;border-radius:4px;
  font-size:0.9375rem;font-weight:700;letter-spacing:0.1em;
  transition:transform 0.2s,box-shadow 0.3s;
  display:inline-block;
}
.btn-main::before{
  content:'';position:absolute;inset:0;
  background:var(--primary-dark);
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.4s ease;
}
.btn-main span{position:relative;z-index:1}
.btn-main:hover::before{transform:scaleX(1)}
.btn-main:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(200,134,10,0.5)}
.btn-sub{
  position:relative;overflow:hidden;
  border:2px solid rgba(255,255,255,0.8);color:var(--white);
  padding:12px 32px;border-radius:4px;
  font-size:0.9375rem;font-weight:500;letter-spacing:0.1em;
  transition:transform 0.2s,color 0.3s;
  display:inline-block;
}
.btn-sub::before{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,0.95);
  transform:scaleY(0);transform-origin:bottom;
  transition:transform 0.35s ease;
}
.btn-sub span{position:relative;z-index:1;transition:color 0.3s}
.btn-sub:hover::before{transform:scaleY(1)}
.btn-sub:hover span{color:var(--primary-dark)}
.btn-sub:hover{transform:translateY(-3px)}
.hero-dots{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  z-index:4;display:flex;gap:10px;
}
.hero-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,0.4);cursor:pointer;
  transition:background 0.3s,transform 0.3s;
  border:none;
}
.hero-dot.active{background:var(--white);transform:scale(1.4)}
/* SVG dashed circle */
.hero-svg-deco{
  position:absolute;z-index:2;pointer-events:none;
  animation:rotateSlow 30s linear infinite;
}
.hero-svg-deco-1{top:-60px;right:-60px;width:300px;height:300px;opacity:0.25}
.hero-svg-deco-2{bottom:-80px;left:-80px;width:250px;height:250px;opacity:0.2}
.hero-scroll{
  position:absolute;bottom:28px;right:40px;z-index:4;
  color:rgba(255,255,255,0.7);font-size:0.7rem;letter-spacing:0.2em;
  writing-mode:vertical-rl;display:flex;align-items:center;gap:8px;
  animation:fadeIn 2s ease 1.5s both;
}
.hero-scroll::after{
  content:'';width:1px;height:48px;background:rgba(255,255,255,0.5);
  animation:scrollLine 2s ease-in-out infinite;
}
@keyframes scrollLine{
  0%{transform:scaleY(0);transform-origin:top;opacity:1}
  50%{transform:scaleY(1);transform-origin:top;opacity:1}
  100%{transform:scaleY(1);transform-origin:bottom;opacity:0}
}
@keyframes rotateSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ===== WAVE DIVIDER ===== */
.wave-divider{display:block;width:100%;line-height:0;overflow:hidden}
.wave-divider svg{display:block}

/* ===== SECTION BASE ===== */
section{padding:96px 0;position:relative}
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.section-label{
  display:inline-flex;align-items:center;gap:10px;
  font-size:0.75rem;letter-spacing:0.2em;font-weight:700;
  color:var(--accent);text-transform:uppercase;margin-bottom:16px;
}
.section-label::before,.section-label::after{
  content:'';flex:1;height:1px;background:var(--accent);width:30px;
}
.section-title{
  font-family:var(--font-serif);font-size:clamp(1.8rem,4vw,2.8rem);
  font-weight:700;line-height:1.3;letter-spacing:0.04em;
  color:var(--text);margin-bottom:16px;
}
.section-title span{color:var(--primary)}
.section-desc{
  font-size:0.9375rem;color:var(--text-light);line-height:1.9;
  max-width:620px;
}
.text-center{text-align:center}
.text-center .section-desc{margin:0 auto}

/* ===== SCROLL ANIMATIONS ===== */
.fade-up{opacity:0;transform:translateY(48px);transition:opacity 0.7s ease,transform 0.7s ease}
.fade-left{opacity:0;transform:translateX(-48px);transition:opacity 0.7s ease,transform 0.7s ease}
.fade-right{opacity:0;transform:translateX(48px);transition:opacity 0.7s ease,transform 0.7s ease}
.scale-in{opacity:0;transform:scale(0.88);transition:opacity 0.6s ease,transform 0.6s ease}
.visible{opacity:1!important;transform:none!important}

/* ===== CONCEPT ===== */
#concept{background:var(--bg)}
.concept-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:80px;align-items:center;
}
.concept-img-wrap{
  position:relative;border-radius:4px;overflow:hidden;
}
.concept-img{
  width:100%;height:520px;object-fit:cover;
  border-radius:4px;
  transition:transform 0.6s ease;
}
.concept-img-wrap:hover .concept-img{transform:scale(1.04)}
.concept-img-accent{
  position:absolute;bottom:-20px;right:-20px;
  width:180px;height:180px;
  border:3px solid var(--accent);border-radius:4px;
  opacity:0.5;pointer-events:none;
}
.concept-img-frame{
  position:absolute;top:-20px;left:-20px;
  width:80px;height:80px;
  border-top:3px solid var(--primary);
  border-left:3px solid var(--primary);
  border-radius:2px;pointer-events:none;
}
.concept-text .section-label{margin-bottom:20px}
.concept-body{
  font-size:0.9375rem;color:var(--text-light);line-height:2.0;
  margin-bottom:32px;
}
.concept-features{
  display:flex;flex-direction:column;gap:16px;margin-bottom:40px;
}
.concept-feature{
  display:flex;align-items:flex-start;gap:14px;
  padding:16px 20px;
  background:var(--bg2);border-radius:6px;
  border-left:3px solid var(--primary);
}
.concept-feature-icon{
  font-size:1.5rem;flex-shrink:0;margin-top:2px;
}
.concept-feature-text strong{
  display:block;font-size:0.875rem;font-weight:700;
  color:var(--primary-dark);margin-bottom:2px;
}
.concept-feature-text span{font-size:0.8125rem;color:var(--text-light)}
.btn-accent{
  position:relative;overflow:hidden;
  background:var(--primary);color:var(--white);
  padding:14px 36px;border-radius:4px;
  font-size:0.9375rem;font-weight:700;letter-spacing:0.1em;
  transition:transform 0.2s,box-shadow 0.3s;
  display:inline-block;
}
.btn-accent::before{
  content:'';position:absolute;inset:0;
  background:var(--primary-dark);
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.4s ease;
}
.btn-accent span{position:relative;z-index:1}
.btn-accent:hover::before{transform:scaleX(1)}
.btn-accent:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(90,122,58,0.4)}

/* ===== MENU ===== */
#menu{background:var(--bg2);position:relative}
.menu-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:28px;margin-top:56px;
}
.menu-card{
  background:var(--white);border-radius:8px;
  overflow:hidden;
  box-shadow:0 2px 16px var(--shadow);
  transition:transform 0.35s ease,box-shadow 0.35s ease;
  position:relative;
}
.menu-card::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:3px;background:var(--primary);
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.4s ease;z-index:2;
}
.menu-card:hover::before{transform:scaleX(1)}
.menu-card:hover{
  transform:translateY(-8px);
  box-shadow:0 16px 48px rgba(44,36,22,0.18);
}
.menu-card-badge{
  position:absolute;top:16px;right:16px;z-index:3;
  background:var(--accent);color:var(--white);
  font-size:0.6875rem;font-weight:700;letter-spacing:0.1em;
  padding:4px 12px;border-radius:20px;
}
.menu-card-body{padding:28px 24px}
.menu-icon{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary-light),var(--primary));
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;margin-bottom:18px;
  box-shadow:0 4px 14px rgba(90,122,58,0.3);
}
.menu-name{
  font-family:var(--font-serif);font-size:1.125rem;font-weight:700;
  color:var(--text);margin-bottom:8px;letter-spacing:0.04em;
}
.menu-desc{font-size:0.8125rem;color:var(--text-light);line-height:1.7;margin-bottom:20px}
.menu-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:16px;border-top:1px solid var(--border);
}
.menu-price{
  font-family:var(--font-serif);font-size:1.375rem;font-weight:700;
  color:var(--primary);
}
.menu-price sup{font-size:0.75rem;margin-right:2px}
.menu-tag{
  font-size:0.7rem;letter-spacing:0.1em;
  color:var(--text-light);background:var(--bg2);
  padding:3px 10px;border-radius:12px;
}
.menu-card:nth-child(4) .menu-tag,
.menu-card:nth-child(5) .menu-tag{
  background:rgba(200,134,10,0.1);color:var(--accent);
}

/* ===== GALLERY ===== */
#gallery{background:var(--bg)}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:auto auto;
  gap:16px;margin-top:56px;
}
.gallery-item{
  position:relative;overflow:hidden;border-radius:6px;
  cursor:pointer;
}
.gallery-item:first-child{
  grid-column:1/2;grid-row:1/3;
}
.gallery-img{
  width:100%;height:100%;object-fit:cover;
  transition:transform 0.5s ease;
  min-height:200px;
}
.gallery-item:first-child .gallery-img{min-height:420px;height:100%}
.gallery-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(44,36,22,0.7) 0%,transparent 60%);
  opacity:0;transition:opacity 0.4s ease;
  display:flex;align-items:flex-end;padding:24px;
}
.gallery-overlay-text{
  color:var(--white);font-size:0.875rem;font-weight:500;
  transform:translateY(12px);transition:transform 0.4s ease;
  letter-spacing:0.06em;font-family:var(--font-serif);
}
.gallery-item:hover .gallery-img{transform:scale(1.08)}
.gallery-item:hover .gallery-overlay{opacity:1}
.gallery-item:hover .gallery-overlay-text{transform:translateY(0)}

/* ===== STATS ===== */
#stats{
  background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 100%);
  padding:80px 0;position:relative;overflow:hidden;
}
.stats-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:40px;position:relative;z-index:1;
}
.stat-item{text-align:center;color:var(--white)}
.stat-number{
  font-family:var(--font-serif);font-size:clamp(2.5rem,5vw,3.5rem);
  font-weight:700;line-height:1;margin-bottom:8px;
  color:var(--accent-light);
}
.stat-unit{font-size:0.875rem;margin-left:2px}
.stat-label{
  font-size:0.875rem;letter-spacing:0.12em;opacity:0.85;
  font-weight:500;
}
.stat-divider{
  width:40px;height:2px;background:rgba(255,255,255,0.3);
  margin:12px auto;
}
.stats-bg-circle{
  position:absolute;border-radius:50%;
  border:1px solid rgba(255,255,255,0.08);
  pointer-events:none;
}
.stats-bg-circle-1{width:400px;height:400px;top:-200px;right:-100px}
.stats-bg-circle-2{width:600px;height:600px;bottom:-350px;left:-200px}

/* ===== ACCESS ===== */
#access{background:var(--bg2)}
.access-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:64px;align-items:start;margin-top:56px;
}
.access-info-list{
  display:flex;flex-direction:column;gap:0;margin-bottom:36px;
}
.access-info-item{
  display:flex;align-items:flex-start;gap:16px;
  padding:18px 0;border-bottom:1px solid var(--border);
}
.access-info-item:first-child{border-top:1px solid var(--border)}
.access-info-icon{
  width:40px;height:40px;border-radius:50%;
  background:var(--primary);display:flex;align-items:center;
  justify-content:center;font-size:1rem;color:var(--white);
  flex-shrink:0;
}
.access-info-label{
  font-size:0.75rem;letter-spacing:0.1em;color:var(--text-light);
  font-weight:700;text-transform:uppercase;margin-bottom:4px;
}
.access-info-value{
  font-size:0.9375rem;font-weight:500;color:var(--text);line-height:1.6;
}
.access-info-value a{color:var(--primary);transition:color 0.3s}
.access-info-value a:hover{color:var(--accent)}
.map-wrap{
  border-radius:8px;overflow:hidden;
  box-shadow:0 8px 32px var(--shadow);
  height:400px;position:relative;
}
.map-wrap iframe{width:100%;height:100%;border:none}

/* ===== CTA ===== */
#cta{
  position:relative;overflow:hidden;
  background:var(--bg);padding:100px 0;
}
.cta-bg{position:absolute;inset:0;pointer-events:none;z-index:0}
.cta-inner{
  position:relative;z-index:1;
  text-align:center;max-width:700px;margin:0 auto;
  background:var(--white);border-radius:12px;
  padding:64px 48px;
  box-shadow:0 20px 60px var(--shadow);
}
.cta-label{
  font-size:0.75rem;letter-spacing:0.2em;font-weight:700;
  color:var(--accent);margin-bottom:20px;
  display:block;
}
.cta-title{
  font-family:var(--font-serif);font-size:clamp(1.6rem,3.5vw,2.4rem);
  font-weight:700;color:var(--text);margin-bottom:20px;
  line-height:1.4;letter-spacing:0.04em;
}
.cta-desc{
  font-size:0.9375rem;color:var(--text-light);line-height:1.9;
  margin-bottom:40px;
}
.cta-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn-cta-main{
  position:relative;overflow:hidden;
  background:var(--accent);color:var(--white);
  padding:16px 44px;border-radius:4px;
  font-size:1rem;font-weight:700;letter-spacing:0.12em;
  transition:transform 0.2s,box-shadow 0.3s;
  display:inline-block;
}
.btn-cta-main::before{
  content:'';position:absolute;inset:0;
  background:var(--primary-dark);
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.4s ease;
}
.btn-cta-main span{position:relative;z-index:1}
.btn-cta-main:hover::before{transform:scaleX(1)}
.btn-cta-main:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(200,134,10,0.45)}
.btn-cta-sub{
  position:relative;overflow:hidden;
  background:transparent;color:var(--primary);
  padding:14px 36px;border-radius:4px;
  font-size:1rem;font-weight:700;letter-spacing:0.1em;
  border:2px solid var(--primary);
  transition:transform 0.2s,color 0.3s;
  display:inline-block;
}
.btn-cta-sub::before{
  content:'';position:absolute;inset:0;
  background:var(--primary);
  transform:scaleY(0);transform-origin:bottom;
  transition:transform 0.35s ease;
}
.btn-cta-sub span{position:relative;z-index:1;transition:color 0.3s}
.btn-cta-sub:hover::before{transform:scaleY(1)}
