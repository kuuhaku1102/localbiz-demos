<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スナック夜約・やす子 | 宮崎県新富町</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--gold:#c9a84c;
--gold-light:#e8c97a;
--gold-dark:#a07830;
--dark:#0d0a08;
--dark2:#1a1410;
--dark3:#241e18;
--mid:#3a3028;
--text:#f5ede0;
--text-sub:#c4b49a;
--white:#fff;
--accent:#e8875a;
}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--dark);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow-x:hidden;line-height:1.8}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
ul{list-style:none}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px}

/* ===== HEADER ===== */
header{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:0 40px;height:80px;display:flex;align-items:center;justify-content:space-between;transition:background .4s,backdrop-filter .4s,box-shadow .4s}
header.scrolled{background:rgba(13,10,8,.92);backdrop-filter:blur(12px);box-shadow:0 2px 30px rgba(0,0,0,.5)}
.logo{font-family:'Noto Serif JP',serif;font-size:1.25rem;font-weight:600;letter-spacing:.12em;color:var(--gold);white-space:nowrap}
.logo span{font-size:.75rem;display:block;font-weight:300;color:var(--text-sub);letter-spacing:.2em;margin-top:2px}
nav ul{display:flex;gap:36px;align-items:center}
nav a{font-size:.8rem;letter-spacing:.15em;color:var(--text-sub);transition:color .3s;position:relative}
nav a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--gold);transition:width .3s}
nav a:hover{color:var(--gold)}
nav a:hover::after{width:100%}
.nav-cta{border:1px solid var(--gold);padding:8px 20px;border-radius:2px;color:var(--gold)!important;font-size:.78rem;letter-spacing:.15em;position:relative;overflow:hidden}
.nav-cta::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .35s ease;z-index:-1}
.nav-cta:hover{color:var(--dark)!important}
.nav-cta:hover::before{transform:scaleX(1)}
.hamburger{display:none;flex-direction:column;gap:6px;cursor:pointer;z-index:1100}
.hamburger span{width:28px;height:1.5px;background:var(--gold);transition:all .35s}
.hamburger.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg)}
.mobile-nav{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(13,10,8,.97);z-index:1050;flex-direction:column;align-items:center;justify-content:center;gap:36px;opacity:0;transition:opacity .4s}
.mobile-nav.open{display:flex;opacity:1}
.mobile-nav a{font-family:'Noto Serif JP',serif;font-size:1.4rem;letter-spacing:.2em;color:var(--text-sub);transition:color .3s}
.mobile-nav a:hover{color:var(--gold)}

/* ===== HERO ===== */
.hero{position:relative;height:100vh;min-height:600px;overflow:hidden}
.hero-slider{position:absolute;inset:0}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease;will-change:opacity}
.slide.active{opacity:1}
.slide-img{width:100%;height:100%;object-fit:cover;transform:scale(1.08);transition:transform 6s ease}
.slide.active .slide-img{transform:scale(1)}
.hero-parallax{position:absolute;inset:0;will-change:transform}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(13,10,8,.35) 0%,rgba(13,10,8,.55) 50%,rgba(13,10,8,.85) 100%)}
.hero-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.hero-sub{font-size:.75rem;letter-spacing:.4em;color:var(--gold);margin-bottom:24px;opacity:0;animation:fadeUp .8s .5s forwards}
.hero-title{font-family:'Noto Serif JP',serif;font-size:clamp(2rem,5vw,3.8rem);font-weight:600;line-height:1.5;letter-spacing:.08em;margin-bottom:28px;opacity:0;animation:fadeUp .9s .8s forwards}
.hero-title span{display:block;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,2.5vw,1.6rem);font-weight:300;color:var(--gold-light);letter-spacing:.3em;margin-bottom:8px}
.hero-line{width:60px;height:1px;background:var(--gold);margin:0 auto 28px;opacity:0;animation:fadeUp .8s 1s forwards}
.hero-desc{font-size:.9rem;letter-spacing:.12em;color:var(--text-sub);margin-bottom:40px;opacity:0;animation:fadeUp .8s 1.2s forwards}
.hero-btns{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;opacity:0;animation:fadeUp .8s 1.4s forwards}
.btn-main{display:inline-block;padding:15px 40px;border:1px solid var(--gold);color:var(--gold);font-size:.82rem;letter-spacing:.2em;position:relative;overflow:hidden;transition:color .35s}
.btn-main::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .35s ease;z-index:-1}
.btn-main:hover{color:var(--dark)}
.btn-main:hover::before{transform:scaleX(1)}
.btn-sub{display:inline-block;padding:15px 40px;border:1px solid rgba(255,255,255,.3);color:var(--text-sub);font-size:.82rem;letter-spacing:.2em;position:relative;overflow:hidden;transition:color .35s}
.btn-sub::before{content:'';position:absolute;bottom:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.12);transform:scaleY(0);transform-origin:bottom;transition:transform .35s ease;z-index:-1}
.btn-sub:hover{color:var(--white)}
.btn-sub:hover::before{transform:scaleY(1)}

/* SVG dashed circle hero */
.hero-deco-circle{position:absolute;top:60px;right:60px;opacity:.3;animation:rotate 30s linear infinite}
.hero-deco-circle2{position:absolute;bottom:100px;left:40px;opacity:.2;animation:rotate 40s linear infinite reverse}
@keyframes rotate{to{transform:rotate(360deg)}}

/* Dot nav */
.hero-dots{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:10}
.dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--gold);cursor:pointer;transition:background .3s,transform .3s}
.dot.active{background:var(--gold);transform:scale(1.3)}

/* ===== WAVE DIVIDER ===== */
.wave-divider{display:block;width:100%;overflow:hidden;line-height:0;margin-top:-2px}
.wave-divider.flip{transform:scaleY(-1)}

/* ===== SECTIONS COMMON ===== */
section{padding:100px 40px}
.section-label{font-size:.7rem;letter-spacing:.5em;color:var(--gold);text-transform:uppercase;margin-bottom:16px;display:block}
.section-title{font-family:'Noto Serif JP',serif;font-size:clamp(1.6rem,3.5vw,2.6rem);font-weight:600;letter-spacing:.06em;line-height:1.5;margin-bottom:16px}
.section-line{width:50px;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-light));margin-bottom:40px}
.section-desc{color:var(--text-sub);font-size:.9rem;line-height:2;max-width:600px}

/* ===== SCROLL ANIMATIONS ===== */
.reveal{opacity:0;transform:translateY(50px);transition:opacity .8s ease,transform .8s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-50px);transition:opacity .8s ease,transform .8s ease}
.reveal-left.visible{opacity:1;transform:translateX(0)}
.reveal-right{opacity:0;transform:translateX(50px);transition:opacity .8s ease,transform .8s ease}
.reveal-right.visible{opacity:1;transform:translateX(0)}
.reveal-scale{opacity:0;transform:scale(.92);transition:opacity .8s ease,transform .8s ease}
.reveal-scale.visible{opacity:1;transform:scale(1)}
.delay-1{transition-delay:.1s}
.delay-2{transition-delay:.2s}
.delay-3{transition-delay:.3s}
.delay-4{transition-delay:.4s}
.delay-5{transition-delay:.5s}

/* ===== CONCEPT ===== */
.concept{background:var(--dark2);position:relative;overflow:hidden}
.concept-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.concept-img-wrap{position:relative}
.concept-img-wrap img{width:100%;height:540px;object-fit:cover;border-radius:2px}
.concept-img-frame{position:absolute;top:-20px;left:-20px;width:100%;height:100%;border:1px solid rgba(201,168,76,.3);border-radius:2px;pointer-events:none}
.concept-badge{position:absolute;bottom:-20px;right:-20px;width:110px;height:110px;background:var(--gold);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.concept-badge span:first-child{font-family:'Noto Serif JP',serif;font-size:.65rem;color:var(--dark);letter-spacing:.1em;display:block;line-height:1.4}
.concept-badge span:last-child{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--dark);letter-spacing:.05em}
.concept-text blockquote{font-family:'Noto Serif JP',serif;font-size:1.05rem;line-height:2;color:var(--text);margin:24px 0;padding-left:20px;border-left:2px solid var(--gold)}
.concept-info{display:flex;gap:30px;margin-top:30px}
.info-item{display:flex;flex-direction:column;gap:4px}
.info-item .info-label{font-size:.68rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase}
.info-item .info-val{font-family:'Noto Serif JP',serif;font-size:.95rem;color:var(--text)}

/* ===== MENU ===== */
.menu{background:var(--dark3);position:relative;overflow:hidden}
.menu::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at top right,rgba(201,168,76,.06) 0%,transparent 60%)}
.menu-inner{max-width:1100px;margin:0 auto}
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:60px}
.menu-card{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);padding:36px 28px;position:relative;overflow:hidden;transition:transform .4s ease,box-shadow .4s ease}
.menu-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light));transform:scaleX(0);transform-origin:left;transition:transform .4s ease}
.menu-card::after{content:'';position:absolute;inset:0;background:rgba(201,168,76,.04);opacity:0;transition:opacity .4s}
.menu-card:hover{transform:translateY(-8px);box-shadow:0 20px 50px rgba(0,0,0,.4)}
.menu-card:hover::before{transform:scaleX(1)}
.menu-card:hover::after{opacity:1}
.menu-icon{font-size:2rem;margin-bottom:18px;display:block}
.menu-name{font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:600;letter-spacing:.08em;margin-bottom:8px;color:var(--text)}
.menu-price{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:var(--gold);letter-spacing:.05em;margin-bottom:14px;line-height:1}
.menu-price span{font-size:.85rem;font-family:'Noto Sans JP',sans-serif;color:var(--text-sub);font-weight:300;margin-left:4px}
.menu-desc{font-size:.8rem;color:var(--text-sub);line-height:1.8}

/* ===== GALLERY ===== */
.gallery{background:var(--dark2);position:relative;overflow:hidden}
.gallery-inner{max-width:1200px;margin:0 auto}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:16px;margin-top:60px}
.g-item{position:relative;overflow:hidden;cursor:pointer}
.g-item:first-child{grid-column:span 2;grid-row:span 2}
.g-item img{width:100%;height:100%;object-fit:cover;min-height:260px;transition:transform .6s ease}
.g-item:hover img{transform:scale(1.08)}
.g-overlay{position:absolute;inset:0;background:rgba(13,10,8,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .4s;text-align:center;padding:20px}
.g-item:hover .g-overlay{opacity:1}
.g-overlay span{font-family:'Noto Serif JP',serif;font-size:1rem;color:var(--gold);letter-spacing:.2em;transform:translateY(10px);transition:transform .4s .05s}
.g-item:hover .g-overlay span{transform:translateY(0)}
.g-overlay p{font-size:.75rem;color:var(--text-sub);margin-top:8px;letter-spacing:.1em;transform:translateY(10px);transition:transform .4s .1s}
.g-item:hover .g-overlay p{transform:translateY(0)}

/* ===== STATS ===== */
.stats{background:var(--dark);position:relative;overflow:hidden;padding:80px 40px}
.stats-inner{max-width:900px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:40px;text-align:center;margin-top:60px}
.stat-item{position:relative}
.stat-item::after{content:'';position:absolute;top:50%;right:0;transform:translateY(-50%);width:1px;height:60px;background:rgba(201,168,76,.2)}
.stat-item:last-child::after{display:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:3.5rem;font-weight:600;color:var(--gold);line-height:1;display:block}
.stat-unit{font-size:.8rem;color:var(--gold-light);font-family:'Cormorant Garamond',serif}
.stat-label{font-size:.72rem;letter-spacing:.2em;color:var(--text-sub);margin-top:10px;display:block}

/* ===== ACCESS ===== */
.access{background:var(--dark3);position:relative;overflow:hidden}
.access-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start}
.access-info{display:flex;flex-direction:column;gap:30px}
.info-row{display:flex;gap:20px;align-items:flex-start;padding-bottom:24px;border-bottom:1px solid rgba(255,255,255,.06)}
.info-row:last-child{border:none}
.info-ico{width:44px;height:44px;border:1px solid rgba(201,168,76,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--gold);font-size:1rem}
.info-body{}
.info-body h4{font-family:'Noto Serif JP',serif;font-size:.8rem;letter-spacing:.2em;color:var(--gold);margin-bottom:6px}
.info-body p{font-size:.88rem;color:var(--text);line-height:1.8}
.map-wrap{width:100%;border-radius:4px;overflow:hidden;border:1px solid rgba(201,168,76,.2)}
.map-wrap iframe{width:100%;height:400px;display:block;filter:grayscale(.6) contrast(1.1)}

/* ===== CTA ===== */
.cta{background:var(--dark2);position:relative;overflow:hidden;text-align:center;padding:120px 40px}
.cta-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.08}
.cta-content{position:relative;z-index:2;max-width:700px;margin:0 auto}
.cta-title{font-family:'Noto Serif JP',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:600;letter-spacing:.06em;line-height:1.6;margin-bottom:20px}
.cta-desc{font-size:.9rem;color:var(--text-sub);line-height:2;margin-bottom:40px}
.cta-tel{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:600;color:var(--gold);letter-spacing:.05em;display:block;margin-bottom:8px}
.cta-tel-label{font-size:.72rem;letter-spacing:.3em;color:var(--text-sub);margin-bottom:40px;display:block}
.cta-btns{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.btn-gold{display:inline-block;padding:18px 50px;background:var(--gold);color:var(--dark);font-size:.85rem;letter-spacing:.2em;font-weight:700;position:relative;overflow:hidden;transition:color .35s}
.btn-gold::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:var(--gold-dark);transform:scaleX(0);transform-origin:left;transition:transform .35s ease;z-index:0}
.btn-gold span{position:relative;z-index:1}
.btn-gold:hover::before{transform:scaleX(1)}
.btn-outline{display:inline-block;padding:18px 50px;border:1px solid var(--gold);color:var(--gold);font-size:.85rem;letter-spacing:.2em;position:relative;overflow:hidden;transition:color .35s}
.btn-outline::before{content:'';position:absolute;bottom:0;left:0;width:100%;height:100%;background:rgba(201,168,76,.12);transform:scaleY(0);transform-origin:bottom;transition:transform .35s ease;z-index:0}
.btn-outline span{position:relative;z-index:1}
.btn-outline:hover{color:var(--white)}
.btn-outline:hover::before{transform:scaleY(1)}

/* ===== FOOTER ===== */
footer{background:var(--dark);border-top:1px solid rgba(201,168,76,.15);padding:60px 40px 30px}
.footer-inner{max-width:1100px;margin:0 auto}
.footer-top{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:60px;padding-bottom:50px;border-bottom:1px solid rgba(255,255,255,.06)}
.footer-brand .logo{margin-bottom:16px;display:inline-block}
.footer-brand p{font-size:.8rem;color:var(--text-sub);line-height:1.9;max-width:280px}
.footer-col h5{font-family:'Noto Serif JP',serif;font-size:.85rem;letter-spacing:.2em;color:var(--gold);margin-bottom:20px}
.footer-col ul li{margin-bottom:10px}
.footer-col ul li a{font-size:.78rem;color:var(--text-sub);transition:color .3s}
.footer-col ul li a:hover{color:var(--gold)}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:24px;flex-wrap:wrap;gap:10px}
.footer-copy{font-size:.72rem;color:rgba(255,255,255,.3);letter-spacing:.1em}
.footer-credit{font-size:.72rem;color:rgba(255,255,255,.3)}
.footer-credit a{color:var(--gold-dark);transition:color .3s}
.footer-credit a:hover{color:var(--gold)}

/* ===== KEYFRAMES ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
.concept-inner{gap:50px}
.menu-grid{grid-template-columns:repeat(2,1fr)}
.stats-grid{grid-template-columns:repeat(2,1fr);gap:30px}
.stat-item:nth-child(2)::after,.stat-item:nth-child(4)::after{display:none}
.footer-top{grid-template-columns:1fr 1fr;gap:40px}
.footer-brand{grid-column:span 2}
}
@media(max-width:768px){
header{padding:0 20px;height:68px}
.nav-desktop{display:none}
.hamburger{display:flex}
section{padding:70px 24px}
.hero-deco-circle{display:none}
.hero-btns{gap:12px}
.btn-main,.btn-sub{padding:13px 28px;font-size:.78rem}
.concept-inner{grid-template-columns:1fr;gap:50px}
.concept-img-wrap img{height:340px}
.menu-grid{grid-template-columns:1fr}
.gallery-grid{grid-template-columns:1fr 1fr}
.g-item:first-child{grid-column:span 2;grid-row:span 1}
.g-item:first-child img{min-height:220px}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.access-inner{grid-template-columns:1fr;gap:50px}
.footer-top{grid-template-columns:1fr;gap:30px}
.footer-brand{grid-column:span 1}
.cta-tel{font-size:2rem}
.footer-bottom{flex-direction:column;align-items:flex-start;gap:6px}
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header id="header">
  <a href="#" class="logo">スナック夜約・やす子<span>SNACK YAYAKU YASUKO</span></a>
  <nav class="nav-desktop">
    <ul>
      <li><a href="#concept">コンセプト</a></li>
      <li><a href="#menu">メニュー</a></li>
      <li><a href="#gallery">ギャラリー</a></li>
      <li><a href="#access">アクセス</a></li>
      <li><a href="tel:0983-33-3208" class="nav-cta">TEL 0983-33-3208</a></li>
    </ul>
  </nav>
  <div class="hamburger" id="hamburger" aria-label="メニュー">
    <span></span><span></span><span></span>
  </div>
</header>

<!-- MOBILE NAV -->
<div class="mobile-nav" id="mobileNav">
  <a href="#concept" class="mobile-link">コンセプト</a>
  <a href="#menu" class="mobile-link">メニュー</a>
  <a href="#gallery" class="mobile-link">ギャラリー</a>
  <a href="#access" class="mobile-link">アクセス</a>
  <a href="#cta" class="mobile-link" style="color:var(--gold)">ご予約・お問い合わせ</a>
</div>

<!-- ===== HERO ===== -->
<section class="hero" id="hero">
  <div class="hero-slider" id="heroSlider">
    <!-- SVG deco circles -->
    <svg class="hero-deco-circle" width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none;z-index:5;position:absolute;top:70px;right:60px">
      <circle cx="90" cy="90" r="85" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="8 6"/>
    </svg>
    <svg class="hero-deco-circle2" width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none;z-index:5;position:absolute;bottom:120px;left:40px">
      <circle cx="60" cy="60" r="56" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4 5"/>
    </svg>

    <div class="slide active" data-index="0">
      <div class="hero-parallax" id="heroParallax">
        <img class="slide-img" src="https://images.unsplash.com/photo-1595974379912-059537676bbb?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w4OTA2ODN8MHwxfHJhbmRvbXx8fHx8fHx8fDE3NzMwMjU0Mzl8&ixlib=rb-4.1.0&q=80&w=1080" alt="スナック夜約やす子 店内1">
      </div>
    </div>
    <div class="slide" data-
